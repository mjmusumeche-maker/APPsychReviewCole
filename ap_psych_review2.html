const QUESTIONS = [
// === UNIT 1 ===
{u:1,q:"A researcher finds that identical twins raised apart show more similar IQ scores than fraternal twins raised together. This finding best supports the role of:",choices:["Environmental enrichment in intelligence","Genetic influence on intelligence","Shared family environment in intelligence","Epigenetic modification of intelligence"],correct:1,explanation:"Higher concordance in identical (monozygotic) twins despite different environments indicates a strong genetic component. Fraternal twins share only ~50% of genes, so lower similarity despite shared environment supports heritability.",concept:"Behavioral Genetics & Heritability"},
{u:1,q:"Which division of the nervous system would be MOST active when a student is calmly digesting lunch while reading a textbook?",choices:["Sympathetic nervous system division","Somatic nervous system division","Parasympathetic nervous system","Central nervous system pathway"],correct:2,explanation:"The parasympathetic division of the autonomic nervous system promotes 'rest-and-digest' functions — slowing heart rate, stimulating digestion, and conserving energy during calm states.",concept:"Autonomic Nervous System"},
{u:1,q:"During an action potential, the neuron's interior becomes positively charged as:",choices:["Potassium ions rush out of the cell","Sodium ions rush into the cell","Neurotransmitters are released from vesicles","GABA inhibits the postsynaptic neuron"],correct:1,explanation:"Depolarization occurs when voltage-gated sodium (Na+) channels open, allowing positively charged sodium ions to flow into the neuron, making the interior temporarily positive.",concept:"Action Potential & Neural Firing"},
{u:1,stimulus:{text:"A patient presents with difficulty producing fluent speech. She understands what others say and can follow complex instructions, but her own speech is halting, effortful, and limited to short phrases.",source:"Clinical case study"},q:"The patient's symptoms are most consistent with damage to:",choices:["Wernicke's area in the left temporal lobe","The hippocampus in the medial temporal lobe","Broca's area in the left frontal lobe","The occipital lobe visual cortex"],correct:2,explanation:"Broca's area (left frontal lobe) controls speech production. Damage produces Broca's aphasia — halting, effortful speech with intact comprehension. Wernicke's area damage impairs comprehension instead.",concept:"Brain Localization — Broca's Area"},
{u:1,q:"A person's sleep is monitored in a lab. During one stage, the EEG shows rapid, low-amplitude brain waves similar to wakefulness, and the person's voluntary muscles are essentially paralyzed. This describes:",choices:["N1 (light sleep with theta waves)","N3 (deep sleep with delta waves)","REM sleep","N2 (sleep spindles and K-complexes)"],correct:2,explanation:"REM sleep features rapid, low-amplitude brain waves resembling wakefulness, rapid eye movements, vivid dreaming, and muscle atonia (temporary paralysis of voluntary muscles).",concept:"Sleep Stages — REM Sleep"},
{u:1,q:"According to Weber's law, a person who can just notice the difference between a 10-pound and an 11-pound weight would need a weight of approximately how many pounds to notice a difference from a 50-pound weight?",choices:["51 pounds","52 pounds","55 pounds","60 pounds"],correct:2,explanation:"Weber's law states the just noticeable difference (JND) is a constant proportion. If the JND for 10 lbs is 1 lb (10%), then for 50 lbs, the JND is 5 lbs (10%), requiring 55 lbs.",concept:"Weber's Law & Difference Threshold"},
{u:1,q:"Which neurotransmitter's dysfunction is MOST associated with both Parkinson's disease (too little) and schizophrenia (too much activity)?",choices:["Serotonin","Acetylcholine","GABA","Dopamine"],correct:3,explanation:"Dopamine deficiency in the substantia nigra causes the motor symptoms of Parkinson's disease, while excess dopamine activity in certain brain pathways is implicated in schizophrenia's positive symptoms.",concept:"Neurotransmitters — Dopamine"},
{u:1,q:"Signal detection theory differs from classical threshold theory because it accounts for:",choices:["The physical intensity of the stimulus presented alone","Psychological factors like expectation and motivation","The functional difference between rods and cones","Weber's constant proportional ratio for each sense"],correct:1,explanation:"Signal detection theory recognizes that detecting a stimulus depends not only on its intensity but also on psychological states — expectations, motivation, fatigue, and decision criteria — producing hits, misses, false alarms, and correct rejections.",concept:"Signal Detection Theory"},
{u:1,stimulus:{text:"Researchers measured cortisol levels and immune function in caregivers of Alzheimer's patients over a 6-year period. Caregivers showed persistently elevated cortisol and significantly reduced immune response compared to matched controls.",source:"Adapted from Kiecolt-Glaser et al., 1991"},q:"These findings best illustrate which stage of Selye's General Adaptation Syndrome?",choices:["Alarm reaction","Resistance","Exhaustion","Recovery"],correct:2,explanation:"During the resistance stage, the body attempts to cope with ongoing stress by maintaining elevated cortisol. Prolonged exposure depletes resources and impairs immune function, as demonstrated by the caregivers' sustained stress response.",concept:"General Adaptation Syndrome"},
{u:1,q:"The myelin sheath speeds neural transmission primarily by:",choices:["Increasing the total amount of neurotransmitter released at the terminal","Allowing the action potential to jump between nodes of Ranvier","Strengthening the baseline resting potential of the neuron membrane","Blocking reuptake of excitatory neurotransmitters in the synapse"],correct:1,explanation:"Myelin insulates the axon, forcing the electrical signal to 'jump' between gaps called nodes of Ranvier (saltatory conduction). This dramatically increases transmission speed compared to unmyelinated neurons.",concept:"Myelin Sheath & Saltatory Conduction"},
{u:1,q:"If a person suffers damage to the hypothalamus, which of the following functions would MOST likely be disrupted?",choices:["Language comprehension and speech production","Coordination of voluntary movement and balance","Regulation of hunger, thirst, and body temperature","Processing of visual information and depth cues"],correct:2,explanation:"The hypothalamus is the brain's key regulator of homeostatic functions including hunger, thirst, body temperature, and the endocrine system through its control of the pituitary gland.",concept:"Brain Structures — Hypothalamus"},
{u:1,q:"Which research method provides the BEST spatial resolution for identifying which specific brain areas are active during a cognitive task?",choices:["EEG (electroencephalogram) recording","fMRI (functional magnetic resonance imaging)","Lesion studies of damaged brain tissue","Detailed longitudinal case studies"],correct:1,explanation:"fMRI measures blood oxygen levels to identify active brain regions with excellent spatial resolution. EEG has better temporal resolution but poor spatial resolution. Lesion studies reveal function only through damage.",concept:"Brain Imaging Methods"},
{u:1,stimulus:{text:"A patient who suffered a motorcycle accident can remember his childhood, his wedding, and events before the accident, but cannot form any new long-term memories since the injury. He can still learn new motor skills without conscious awareness of having practiced them.",source:"Adapted from Scoville & Milner, 1957"},q:"This pattern of deficits is most consistent with damage to the:",choices:["Amygdala","Cerebellum","Hippocampus","Prefrontal cortex"],correct:2,explanation:"The hippocampus is essential for forming new explicit (declarative) memories. Damage produces anterograde amnesia while leaving old memories and implicit/procedural memory (which depends on the cerebellum and basal ganglia) intact — consistent with H.M.'s case.",concept:"Hippocampus & Memory Systems"},
{u:1,q:"The endocrine system communicates using _____, which travel through the _____ and tend to have _____ effects compared to neurotransmitters.",choices:["hormones; bloodstream; slower but longer-lasting","neurotransmitters; synaptic cleft; faster-acting","electrical impulses; spinal cord; largely identical","hormones; neural pathways; faster but shorter"],correct:0,explanation:"The endocrine system uses hormones transported through the bloodstream. Compared to neurotransmitter signaling (which is fast and brief), hormonal effects are slower to begin but longer-lasting.",concept:"Endocrine System"},

// === UNIT 2 ===
{u:2,q:"A radiologist examining an X-ray sees a subtle fracture that a medical student misses entirely. This difference is BEST explained by:",choices:["Bottom-up processing differences","Differences in visual acuity","Top-down processing guided by expertise","The absolute threshold for visual stimuli"],correct:2,explanation:"The radiologist's experience creates schemas and expectations (top-down processing) that guide attention to relevant features. The student lacks these knowledge-driven perceptual frameworks.",concept:"Top-Down vs. Bottom-Up Processing"},
{u:2,q:"A person looking at a broken circle perceives it as a complete circle. This illustrates the Gestalt principle of:",choices:["Proximity","Similarity","Closure","Figure-ground"],correct:2,explanation:"Closure is the Gestalt tendency to perceive incomplete figures as complete. The brain fills in gaps to perceive a whole, organized form rather than disconnected parts.",concept:"Gestalt Principles — Closure"},
{u:2,q:"Tanya assumes that because her coworker dresses formally, he must be highly intelligent and competent. This is an example of the:",choices:["The availability heuristic","Representativeness heuristic","Anchoring and adjustment bias","The framing effect on choice"],correct:1,explanation:"The representativeness heuristic judges probability by how well something matches a prototype or stereotype. Tanya assumes formal dress represents intelligence because it fits her mental prototype.",concept:"Heuristics — Representativeness"},
{u:2,stimulus:{text:"Participants were asked: 'Is the population of Turkey greater or less than 5 million?' or 'Is the population of Turkey greater or less than 65 million?' Those given the 5 million anchor estimated significantly lower populations than those given the 65 million anchor.",source:"Adapted from Tversky & Kahneman, 1974"},q:"This study BEST demonstrates:",choices:["The framing effect on risk decisions","Confirmation bias in information seeking","Anchoring bias in numerical estimation","The availability heuristic"],correct:2,explanation:"Anchoring bias occurs when initial information (the anchor number) disproportionately influences subsequent judgments. Participants' estimates were pulled toward whichever anchor they received, even though the anchors were arbitrary.",concept:"Anchoring Bias"},
{u:2,q:"According to the Atkinson-Shiffrin model, information must pass through _____ before entering long-term memory.",choices:["The sensory register and then working memory","Long-term potentiation in the hippocampus","Only the hippocampal memory consolidator","Iconic memory storage in the visual cortex"],correct:0,explanation:"The Atkinson-Shiffrin three-stage model proposes information flows from sensory memory → short-term/working memory → long-term memory. Rehearsal and encoding transfer information between stages.",concept:"Atkinson-Shiffrin Memory Model"},
{u:2,q:"A student studies vocabulary words by creating vivid mental images connecting each word to a personal experience. This strategy is MOST effective because it involves:",choices:["Simple maintenance rehearsal of information","Shallow acoustic encoding of word sounds","Deep semantic encoding with self-referencing","Iconic sensory memory storage mechanisms"],correct:2,explanation:"Creating personal connections involves deep semantic encoding plus self-referencing, both of which produce stronger, more durable memory traces than shallow rehearsal or surface-level processing.",concept:"Levels of Processing & Self-Reference Effect"},
{u:2,q:"George studied for his exam in the same classroom where he will take the test. Research on memory suggests this will help because of:",choices:["State-dependent memory","The spacing effect","Context-dependent memory","The serial position effect"],correct:2,explanation:"Context-dependent memory shows that retrieval is enhanced when the physical environment at recall matches the encoding environment. Studying in the test room provides matching contextual cues.",concept:"Context-Dependent Memory"},
{u:2,q:"On a word list, participants best remembered the first few and last few items. This phenomenon is called:",choices:["The misinformation effect on recall","The spacing effect on retention","The serial position effect","Proactive interference pattern"],correct:2,explanation:"The serial position effect shows superior recall for beginning items (primacy — rehearsed into LTM) and ending items (recency — still in STM). Middle items are recalled worst.",concept:"Serial Position Effect"},
{u:2,stimulus:{text:"Participants watched a video of a car accident. One group was asked, 'How fast were the cars going when they smashed into each other?' Another group was asked, 'How fast were the cars going when they contacted each other?' The 'smashed' group estimated significantly higher speeds and were more likely to falsely report seeing broken glass.",source:"Adapted from Loftus & Palmer, 1974"},q:"This classic study demonstrates:",choices:["Retrograde amnesia caused by emotional trauma exposure","The misinformation effect and memory reconstruction","State-dependent memory retrieval during high arousal","Proactive interference from prior learned material"],correct:1,explanation:"Loftus and Palmer showed that post-event information (the verb used in the question) altered participants' memory of the event. This demonstrates that memory is reconstructive and susceptible to misleading information.",concept:"Misinformation Effect (Loftus)"},
{u:2,q:"Sarah learned Spanish in high school and is now struggling to learn French because Spanish vocabulary keeps interfering. This is an example of:",choices:["Retroactive interference","Proactive interference","Retrograde amnesia","Source monitoring error"],correct:1,explanation:"Proactive interference occurs when previously learned information interferes with the ability to learn new information. Sarah's existing Spanish knowledge disrupts her French acquisition.",concept:"Proactive Interference"},
{u:2,q:"Sternberg's triarchic theory of intelligence includes analytical, creative, and _____ components.",choices:["Emotional","Practical","Spatial","Mathematical"],correct:1,explanation:"Sternberg's triarchic theory identifies three components: analytical (academic problem-solving), creative (novel solutions), and practical (adapting to real-world contexts — 'street smarts').",concept:"Sternberg's Triarchic Theory"},
{u:2,q:"The Flynn effect refers to:",choices:["Declining IQ scores in industrialized nations","The tendency for IQ tests to be culturally biased","Rising average IQ scores over successive generations","The genetic basis of intelligence becoming stronger"],correct:2,explanation:"The Flynn effect documents that average IQ scores have risen significantly over generations across many countries. This is attributed to environmental factors like improved nutrition, education, and test familiarity.",concept:"The Flynn Effect"},
{u:2,q:"A test that consistently produces the same scores when administered repeatedly has high:",choices:["Content validity","Predictive validity","Standardization","Reliability"],correct:3,explanation:"Reliability refers to the consistency of a test's results. If retaking the test yields similar scores, it demonstrates high test-retest reliability. Validity (whether it measures what it claims) is a separate property.",concept:"Reliability vs. Validity"},
{u:2,q:"Working memory differs from the original concept of short-term memory primarily because working memory:",choices:["Has virtually unlimited storage capacity","Stores all information permanently in the brain","Actively manipulates and processes information","Only handles visual and spatial information"],correct:2,explanation:"Baddeley's working memory model expands STM from a passive store to an active system that manipulates information. It includes the central executive, phonological loop, visuospatial sketchpad, and episodic buffer.",concept:"Working Memory (Baddeley)"},

// === UNIT 3 ===
{u:3,q:"A researcher comparing the cognitive abilities of 5-year-olds, 10-year-olds, and 15-year-olds at one point in time is using a:",choices:["A longitudinal design","A detailed case study","A cross-sectional design","An experimental design"],correct:2,explanation:"Cross-sectional studies compare different age groups at a single time point. They are faster and cheaper than longitudinal studies but can be confounded by cohort effects (generational differences).",concept:"Research Methods — Cross-Sectional Design"},
{u:3,q:"In Piaget's theory, a child who cannot understand that the amount of water stays the same when poured from a short, wide glass into a tall, thin glass has not yet mastered:",choices:["Object permanence","Egocentrism","Conservation","Abstract reasoning"],correct:2,explanation:"Conservation — understanding that quantity remains the same despite changes in appearance — develops during the concrete operational stage (ages 7–11). Preoperational children focus on one dimension (height) and fail conservation tasks.",concept:"Piaget — Conservation"},
{u:3,q:"Vygotsky's zone of proximal development (ZPD) is BEST described as:",choices:["The transition stage between concrete and formal operational thought","Tasks a child can already accomplish entirely on their own","The gap between what a child can do alone and with skilled guidance","The biologically determined critical period for language acquisition"],correct:2,explanation:"The ZPD represents the range of tasks a child cannot yet do independently but can accomplish with guidance from a more knowledgeable other. Scaffolding within the ZPD maximizes learning.",concept:"Vygotsky — Zone of Proximal Development"},
{u:3,stimulus:{text:"In a study, 12-month-old infants were briefly separated from their mothers in an unfamiliar room. Upon reunion, one group of infants sought contact with their mothers and were quickly comforted. A second group avoided their mothers or showed indifference. A third group showed a mix of clinging and angry resistance.",source:"Adapted from Ainsworth, 1978"},q:"The three groups respectively represent which attachment styles?",choices:["Avoidant, secure, disorganized","Secure, avoidant, anxious-ambivalent","Anxious-ambivalent, avoidant, secure","Secure, anxious-ambivalent, avoidant"],correct:1,explanation:"Securely attached infants seek comfort and are soothed easily. Avoidant infants show indifference to the caregiver. Anxious-ambivalent infants are clingy yet resistant to comfort — reflecting inconsistent caregiving.",concept:"Ainsworth's Attachment Styles"},
{u:3,q:"In Erikson's theory, the primary psychosocial crisis of adolescence is:",choices:["Trust vs. mistrust in infancy","Industry vs. inferiority at school","Identity vs. role confusion","Intimacy vs. isolation in adults"],correct:2,explanation:"Erikson's adolescent stage involves identity vs. role confusion — the task of integrating various self-images into a coherent identity. Failure leads to role confusion and uncertainty about one's place in society.",concept:"Erikson — Identity vs. Role Confusion"},
{u:3,q:"In Pavlov's experiments, the bell BEFORE conditioning was a(n) _____ and AFTER conditioning became a(n) _____.",choices:["Unconditioned stimulus; conditioned stimulus","Conditioned stimulus; unconditioned stimulus","Neutral stimulus; conditioned stimulus","Conditioned response; unconditioned response"],correct:2,explanation:"Before conditioning, the bell was a neutral stimulus (NS) — it did not elicit salivation. After repeated pairing with food (US), the bell became a conditioned stimulus (CS) that could elicit salivation (CR) on its own.",concept:"Classical Conditioning Terminology"},
{u:3,q:"A child who has been bitten by a golden retriever now fears all dogs. This is an example of:",choices:["Stimulus discrimination","Spontaneous recovery","Stimulus generalization","Higher-order conditioning"],correct:2,explanation:"Stimulus generalization occurs when a conditioned response extends to stimuli similar to the original conditioned stimulus. The child's fear generalizes from golden retrievers to all dogs.",concept:"Stimulus Generalization"},
{u:3,q:"A parent gives a child a sticker every time the child completes homework. This is an example of:",choices:["Negative reinforcement","Positive punishment","Positive reinforcement","Negative punishment"],correct:2,explanation:"Positive reinforcement adds a pleasant stimulus (sticker) following a behavior (homework completion) to increase the likelihood of that behavior recurring.",concept:"Operant Conditioning — Positive Reinforcement"},
{u:3,q:"Which reinforcement schedule produces the HIGHEST, most consistent rate of responding and is MOST resistant to extinction?",choices:["Fixed-ratio","Variable-ratio","Fixed-interval","Variable-interval"],correct:1,explanation:"Variable-ratio schedules (reinforcement after an unpredictable number of responses) produce high, steady response rates and strong resistance to extinction — like slot machines or sales commission.",concept:"Reinforcement Schedules — Variable Ratio"},
{u:3,stimulus:{text:"In Bandura's experiment, children who watched an adult punch, kick, and shout at an inflatable Bobo doll were significantly more likely to imitate those aggressive behaviors when later placed in a room with the doll, compared to children who watched a non-aggressive adult model.",source:"Adapted from Bandura, Ross, & Ross, 1961"},q:"This study is foundational evidence for:",choices:["Classical conditioning of aggressive responses","Operant conditioning through direct punishment","Observational learning / social learning theory","The Garcia effect on conditioned taste aversion"],correct:2,explanation:"The Bobo doll experiment demonstrated that children learn behaviors through observation of models — without direct reinforcement — supporting Bandura's social learning theory and the concept of vicarious learning.",concept:"Bandura's Observational Learning"},
{u:3,q:"Tolman's research with rats in mazes demonstrated that learning can occur without reinforcement, a concept known as:",choices:["Insight learning","Latent learning","Learned helplessness","Shaping"],correct:1,explanation:"Latent learning occurs without reinforcement and is only demonstrated when motivation is provided. Tolman's rats formed cognitive maps of mazes even without food rewards, demonstrating learning that was hidden until needed.",concept:"Latent Learning (Tolman)"},
{u:3,q:"A toddler says 'I goed to the store' instead of 'I went to the store.' This error demonstrates:",choices:["A language deficit requiring intervention","Telegraphic speech","Overgeneralization of grammatical rules","The nativist theory is incorrect"],correct:2,explanation:"Overgeneralization occurs when children apply grammatical rules too broadly (adding '-ed' for past tense to irregular verbs). This actually demonstrates rule learning — the child has internalized the pattern even for exceptions.",concept:"Language Development — Overgeneralization"},
{u:3,q:"According to Chomsky, the language acquisition device (LAD) is:",choices:["A special hearing aid for language-impaired children","An innate biological mechanism for learning grammar","A behavioral reinforcement system for language","A computer program that models language learning"],correct:1,explanation:"Chomsky proposed that humans are born with an innate LAD — a biological predisposition containing universal grammar — that enables children to rapidly acquire any language they are exposed to.",concept:"Chomsky's Nativist Theory — LAD"},
{u:3,q:"Mirror neurons are significant because they fire both when a person performs an action and when they:",choices:["Enter the REM sleep stage and begin dreaming","Experience acute physical pain from an injury","Observe someone else performing the same action","Hear a sudden loud unexpected auditory stimulus"],correct:2,explanation:"Mirror neurons activate both during action execution and action observation. They provide a neurological basis for imitation, empathy, and observational learning — key processes in social-cognitive development.",concept:"Mirror Neurons"},
{u:3,q:"Harlow's monkey experiments demonstrated that infant attachment is PRIMARILY based on:",choices:["Feeding and nourishment","Contact comfort","Cognitive development","Classical conditioning"],correct:1,explanation:"Harlow showed that infant monkeys preferred the soft cloth 'mother' over the wire 'mother' that provided food. This demonstrated that contact comfort — not feeding — is the primary basis of attachment.",concept:"Harlow — Contact Comfort"},

// === UNIT 4 ===
{u:4,q:"When Maria fails an exam, she blames the unfair test. When her classmate fails, she assumes he didn't study. Maria is demonstrating:",choices:["Self-serving bias and fundamental attribution error","Cognitive dissonance reduction through justification","The just-world hypothesis about deserved outcomes","Actor-observer bias in social perception of others"],correct:0,explanation:"Maria shows self-serving bias (blaming external factors for her failure) and the fundamental attribution error (attributing her classmate's failure to dispositional factors rather than situational ones).",concept:"Attribution Biases"},
{u:4,q:"Leon Festinger's cognitive dissonance theory predicts that a person who volunteers to give a boring speech for NO payment will:",choices:["Openly admit that the speech was boring to the researcher","Change their attitude to believe the speech was interesting","Experience no psychological dissonance whatsoever","Place all blame on the experimenter for the situation"],correct:1,explanation:"With no external justification (payment) for the inconsistency between belief ('boring') and behavior ('promoted it'), the person resolves dissonance by changing their attitude to align with their behavior.",concept:"Cognitive Dissonance Theory"},
{u:4,stimulus:{text:"In a study, participants were asked to judge the length of lines. Unknown to the real participant, other 'participants' (actually confederates) unanimously gave obviously incorrect answers. On critical trials, approximately 37% of participants conformed to the group's wrong answer.",source:"Adapted from Asch, 1951"},q:"Which of the following would MOST likely REDUCE conformity in this paradigm?",choices:["Increasing the total group size from 3 to 15 members","Having the participant give their response publicly","Having one confederate give the correct answer","Making the judgment task significantly more ambiguous"],correct:2,explanation:"Asch found that conformity dropped dramatically when even one dissenter broke unanimity. A single ally giving the correct answer reduced conformity from ~37% to under 10%, showing unanimity is crucial for conformity pressure.",concept:"Asch Conformity — Factors Affecting Conformity"},
{u:4,q:"In Milgram's obedience study, which factor significantly DECREASED obedience rates?",choices:["The experimenter wearing an authoritative lab coat","The study being conducted at prestigious Yale University","The learner being in the same room as the teacher","The teacher hearing increasingly loud pre-recorded screams"],correct:2,explanation:"When the learner was in the same room (increased proximity), obedience decreased significantly. Physical distance from the victim made it easier to obey. Proximity to authority increased obedience, while proximity to the victim decreased it.",concept:"Milgram — Factors Affecting Obedience"},
{u:4,q:"Social loafing is MOST likely to occur when:",choices:["Individual contributions are identifiable","The task is meaningful to participants","The group is large and effort is pooled","A strong leader monitors performance"],correct:2,explanation:"Social loafing — reduced individual effort in groups — increases when the group is large, individual contributions are not identifiable, and the task feels less personally meaningful.",concept:"Social Loafing"},
{u:4,q:"According to Freud, the part of personality that operates on the reality principle and mediates between instinctual desires and moral standards is the:",choices:["Id","Ego","Superego","Collective unconscious"],correct:1,explanation:"The ego operates on the reality principle, mediating between the id's pleasure-seeking impulses and the superego's moral demands. It finds realistic ways to satisfy desires without violating social norms.",concept:"Freud — Id, Ego, Superego"},
{u:4,q:"A person who unconsciously channels aggressive impulses into competitive athletics is using the defense mechanism of:",choices:["Projection","Displacement","Sublimation","Reaction formation"],correct:2,explanation:"Sublimation redirects unacceptable impulses into socially acceptable or even admirable activities. Channeling aggression into athletics transforms the impulse constructively — Freud considered this the most mature defense mechanism.",concept:"Defense Mechanisms — Sublimation"},
{u:4,q:"The Big Five personality traits are:",choices:["Id, ego, superego, preconscious, and the unconscious mind structures","Introversion, intuition, thinking, judging, and perceiving dimensions","Openness, conscientiousness, extraversion, agreeableness, neuroticism","Oral, anal, phallic, latency, and genital psychosexual stage sequence"],correct:2,explanation:"The Big Five (OCEAN) is the most widely accepted and empirically supported trait model. These five broad dimensions consistently emerge across cultures and predict important life outcomes.",concept:"Big Five Personality Traits"},
{u:4,q:"Bandura's concept of self-efficacy refers to:",choices:["A general feeling of self-worth and personal value","Belief in one's ability to succeed at specific tasks","The desire to achieve one's full human potential","An internal locus of control over life outcomes"],correct:1,explanation:"Self-efficacy is one's belief in their capability to execute behaviors necessary to produce specific outcomes. It is task-specific (not general self-esteem) and strongly predicts motivation, effort, and performance.",concept:"Self-Efficacy (Bandura)"},
{u:4,stimulus:{text:"A researcher told elementary school teachers that certain students (randomly selected) had been identified as 'intellectual bloomers' who would show dramatic academic gains. Eight months later, these randomly labeled students actually showed significantly greater IQ gains than their classmates.",source:"Adapted from Rosenthal & Jacobson, 1968"},q:"This study demonstrates the power of:",choices:["The halo effect influencing how teachers grade","Self-fulfilling prophecy / expectancy effects","Cognitive dissonance experienced in education","Social loafing behavior found in classrooms"],correct:1,explanation:"The Pygmalion effect demonstrates self-fulfilling prophecy — teachers' expectations (even based on false information) influenced their behavior toward students, which in turn affected actual student performance.",concept:"Self-Fulfilling Prophecy"},
{u:4,q:"According to the James-Lange theory of emotion:",choices:["Emotion and physiological arousal occur simultaneously","A cognitive label determines which emotion is experienced","Physiological arousal precedes and causes the emotional experience","The thalamus sends signals to both the cortex and body simultaneously"],correct:2,explanation:"James-Lange theory proposes: stimulus → physiological arousal → emotional experience. You feel afraid BECAUSE your heart races, not the other way around. Different physiological patterns produce different emotions.",concept:"James-Lange Theory of Emotion"},
{u:4,q:"The Schachter-Singer two-factor theory proposes that emotion requires:",choices:["Only physiological arousal from the autonomic system","Only cognitive appraisal of the current situation","Both physiological arousal and a cognitive label","Activation of the amygdala and nothing else"],correct:2,explanation:"Schachter-Singer's two-factor theory states that emotion arises from two components: physiological arousal (factor 1) plus cognitive interpretation/labeling of that arousal (factor 2). The same arousal can produce different emotions depending on the label.",concept:"Schachter-Singer Two-Factor Theory"},
{u:4,q:"The Yerkes-Dodson law states that performance is best at:",choices:["The highest possible level of physiological arousal for the person","The lowest possible level of arousal to minimize cognitive interference","A moderate level of arousal, with optimal level varying by task complexity","A level of arousal that is genetically predetermined by personality type"],correct:2,explanation:"The Yerkes-Dodson law shows an inverted-U relationship between arousal and performance. Moderate arousal is optimal for most tasks, with simpler tasks benefiting from higher arousal and complex tasks from lower arousal.",concept:"Yerkes-Dodson Law"},
{u:4,q:"The overjustification effect occurs when:",choices:["A person is punished excessively or too severely for a behavior","External rewards decrease intrinsic motivation for an activity","A person receives far too much positive reinforcement at once","Unrealistically high expectations are set by authority figures"],correct:1,explanation:"The overjustification effect shows that providing external rewards for an already intrinsically enjoyable activity can undermine intrinsic motivation. The person shifts from 'I do it because I enjoy it' to 'I do it for the reward.'",concept:"Overjustification Effect"},
{u:4,q:"A group of friends who initially slightly favored a risky investment become much more enthusiastic about it after discussing it together. This illustrates:",choices:["Groupthink","Social facilitation","Group polarization","Deindividuation"],correct:2,explanation:"Group polarization occurs when group discussion strengthens members' pre-existing attitudes, pushing them toward more extreme positions. Initial slight risk-preference becomes strong risk-preference after discussion.",concept:"Group Polarization"},
{u:4,q:"The bystander effect suggests that the MORE people present at an emergency, the LESS likely any individual is to help, primarily due to:",choices:["Social facilitation","Diffusion of responsibility","The fundamental attribution error","Deindividuation"],correct:1,explanation:"Diffusion of responsibility — each person assumes someone else will act — is the primary mechanism behind the bystander effect. Responsibility is shared among all observers, reducing each individual's sense of obligation to help.",concept:"Bystander Effect & Diffusion of Responsibility"},

// === UNIT 5 ===
{u:5,q:"The biopsychosocial model of health differs from the biomedical model by:",choices:["Focusing exclusively on the biological causes of illness","Integrating biological, psychological, and social factors","Rejecting the role of biology entirely in health outcomes","Emphasizing only psychological factors and ignoring others"],correct:1,explanation:"The biopsychosocial model recognizes that health and illness result from the interaction of biological (genetics, physiology), psychological (stress, coping, beliefs), and social (culture, support, SES) factors — not biology alone.",concept:"Biopsychosocial Model"},
{u:5,q:"According to Seligman's positive psychology, which of the following is MOST strongly associated with lasting subjective well-being?",choices:["High income and material wealth","Physical attractiveness and fitness","Strong social relationships","A prestigious and stable career"],correct:2,explanation:"Research in positive psychology consistently shows that social connectedness and strong relationships are among the strongest predictors of sustained subjective well-being — more so than income, appearance, or career status.",concept:"Positive Psychology — Subjective Well-Being"},
{u:5,q:"The 'four D's' used to define psychological disorders are:",choices:["Dangerous, delusional, depressed, dysfunctional","Deviant, distressful, dysfunctional, dangerous","Developmental, diagnostic, dimensional, disordered","Disabling, delusional, destructive, distorted"],correct:1,explanation:"The four D's — deviance (statistical/social norm violation), distress (subjective suffering), dysfunction (impaired daily functioning), and danger (risk to self/others) — help clinicians determine whether behavior constitutes a disorder.",concept:"Defining Psychological Disorders — The 4 D's"},
{u:5,stimulus:{text:"A 22-year-old college student reports persistent feelings of sadness, loss of interest in activities she previously enjoyed, difficulty sleeping, fatigue, trouble concentrating, and feelings of worthlessness for the past three months. She has withdrawn from friends and is struggling to attend classes.",source:"Clinical case vignette"},q:"Based on DSM-5 criteria, this presentation is MOST consistent with:",choices:["Generalized anxiety disorder","Bipolar I disorder","Major depressive disorder","Schizophrenia"],correct:2,explanation:"The symptoms — persistent depressed mood, anhedonia (loss of interest), sleep disturbance, fatigue, concentration difficulty, worthlessness, and social withdrawal lasting more than two weeks — are hallmark criteria for major depressive disorder.",concept:"Major Depressive Disorder"},
{u:5,q:"Schizophrenia's 'positive symptoms' include:",choices:["Flat affect and social withdrawal","Hallucinations and delusions","Reduced speech and lack of motivation","Memory loss and confusion"],correct:1,explanation:"Positive symptoms ADD to normal experience: hallucinations (false perceptions), delusions (false beliefs), and disorganized speech/behavior. Negative symptoms SUBTRACT: flat affect, avolition, alogia, and social withdrawal.",concept:"Schizophrenia — Positive vs. Negative Symptoms"},
{u:5,q:"The diathesis-stress model proposes that psychological disorders result from:",choices:["Purely genetic factors inherited from biological parents","Purely environmental stressors encountered in daily life","A genetic/biological predisposition activated by stress","Childhood trauma experienced during the first five years"],correct:2,explanation:"The diathesis-stress model explains that disorders arise from the interaction between a vulnerability (diathesis — genetic, biological, or psychological predisposition) and environmental stressors that trigger its expression.",concept:"Diathesis-Stress Model"},
{u:5,q:"Which therapy approach would MOST likely involve a therapist helping a client identify and challenge the automatic negative thought 'I'm worthless because I failed one test'?",choices:["Psychoanalytic therapy and free association","Humanistic client-centered therapy approach","Cognitive-behavioral therapy (CBT)","Wolpe's systematic desensitization method"],correct:2,explanation:"CBT (particularly Beck's cognitive therapy) focuses on identifying and restructuring distorted automatic thoughts (like overgeneralization from one failure to total worthlessness) to reduce depression and anxiety.",concept:"Cognitive-Behavioral Therapy (CBT)"},
{u:5,q:"SSRIs (selective serotonin reuptake inhibitors) work by:",choices:["Blocking dopamine receptors along the mesolimbic reward pathway","Enhancing GABA activity to reduce overall neural excitation levels","Blocking serotonin reuptake, increasing its synaptic availability","Stimulating neurogenesis and the production of entirely new neurons"],correct:2,explanation:"SSRIs block the reuptake of serotonin into the presynaptic neuron, leaving more serotonin available in the synaptic cleft to bind to postsynaptic receptors. This mechanism alleviates symptoms of depression and anxiety.",concept:"Biomedical Treatment — SSRIs"},
{u:5,stimulus:{text:"A researcher conducted a meta-analysis of 475 psychotherapy outcome studies and found that, across all types of therapy, the quality of the therapeutic relationship consistently predicted better outcomes — often more strongly than the specific techniques used.",source:"Adapted from Wampold, 2001"},q:"This finding highlights the importance of:",choices:["The biomedical model of treatment","Psychoanalytic interpretation","The therapeutic alliance","Specific CBT techniques"],correct:2,explanation:"The therapeutic alliance — the quality of the working relationship between client and therapist (warmth, trust, collaboration) — is consistently the strongest predictor of therapy outcomes across all approaches, as demonstrated by meta-analytic research.",concept:"Therapeutic Alliance"},
{u:5,q:"Systematic desensitization is based on the principle of:",choices:["Operant conditioning — positive reinforcement","Observational learning","Classical conditioning — counterconditioning","Psychodynamic free association"],correct:2,explanation:"Systematic desensitization (Wolpe) uses counterconditioning to replace a fear response with relaxation. By pairing a gradual fear hierarchy with deep relaxation (incompatible with anxiety), the conditioned fear is extinguished.",concept:"Systematic Desensitization"},
{u:5,q:"Which of the following is TRUE about electroconvulsive therapy (ECT)?",choices:["It is the standard first-line treatment for mild depression","It is effective for severe, treatment-resistant depression","It primarily works by increasing the reuptake of serotonin","It has been shown to be entirely ineffective by research"],correct:1,explanation:"ECT is used for severe, treatment-resistant depression and involves brief electrical stimulation of the brain under anesthesia. It is often effective when medications and therapy have failed, though it may cause temporary memory issues.",concept:"Electroconvulsive Therapy (ECT)"},
{u:5,q:"A person who experiences intrusive, unwanted thoughts about contamination and spends hours each day washing their hands is MOST likely experiencing:",choices:["Generalized anxiety disorder (GAD)","Recurrent panic disorder episodes","Obsessive-compulsive disorder (OCD)","A specific phobia about germs"],correct:2,explanation:"OCD involves obsessions (intrusive, unwanted thoughts — here, contamination fears) and compulsions (repetitive behaviors performed to reduce anxiety — here, excessive handwashing). The compulsions are time-consuming and distressing.",concept:"Obsessive-Compulsive Disorder (OCD)"},
{u:5,q:"Problem-focused coping differs from emotion-focused coping in that problem-focused coping:",choices:["Addresses the emotional reaction to stress through reappraisal","Uses denial and avoidance strategies to manage the situation","Directly addresses the source of the stressor through action","Is always more effective than any emotion-focused approach"],correct:2,explanation:"Problem-focused coping involves taking direct action to change or eliminate the stressor (e.g., studying more for an exam). Emotion-focused coping manages the emotional response (e.g., seeking comfort, reappraising). Both can be adaptive depending on the situation.",concept:"Coping Strategies"},
{u:5,q:"Post-traumatic growth refers to:",choices:["Worsening symptoms that develop after trauma exposure over time","Positive psychological change following struggle with adversity","The development of PTSD symptoms after a traumatic experience","Physical growth spurts triggered by elevated stress hormones"],correct:1,explanation:"Post-traumatic growth is the positive psychological transformation that can occur after struggling with highly challenging life circumstances — including enhanced relationships, new possibilities, greater appreciation for life, personal strength, and spiritual development.",concept:"Post-Traumatic Growth"},
{u:5,q:"The strongest predictor of positive therapy outcomes across ALL types of psychotherapy is:",choices:["The specific therapeutic technique used by the therapist","The initial severity of the client's presenting disorder","The therapeutic alliance between client and therapist","Whether psychotropic medication is also prescribed"],correct:2,explanation:"Research consistently shows that the therapeutic alliance — the collaborative bond, mutual trust, and agreement on goals between client and therapist — is the strongest predictor of positive outcomes regardless of therapeutic orientation.",concept:"Common Factors in Therapy"},
{u:5,stimulus:{text:"A patient with bipolar disorder has been prescribed lithium to manage mood episodes. Blood levels must be monitored regularly because the therapeutic dose is close to the toxic dose. The patient reports more stable mood but complains of increased thirst and weight gain.",source:"Adapted from clinical pharmacology guidelines"},q:"This scenario illustrates a key challenge of biomedical treatment, namely:",choices:["The placebo effect confounding treatment study results","Side effects and need for careful medication monitoring","The therapeutic alliance being more important than drugs","CBT being more effective than medication for this disorder"],correct:1,explanation:"Psychotropic medications often have significant side effects and require monitoring. Lithium has a narrow therapeutic window (effective dose close to toxic dose), requiring regular blood level checks and management of side effects like thirst and weight gain.",concept:"Biomedical Treatment — Medication Management"}
];

// ========================
// APP STATE & PERSISTENCE
// ========================
const STORAGE_KEY = 'apush_psych_state';
let state = {
  coins: 0,
  streak: 0,
  totalCorrect: 0,
  collectedCards: [],
  missedQuestions: [],
  correctInRow: 0,
  quizHistory: {}
};

function loadState() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
      const parsed = JSON.parse(saved);
      state = { ...state, ...parsed };
    }
  } catch(e) { console.log('State load error:', e); }
}

function saveState() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  } catch(e) { console.log('State save error:', e); }
}

// ========================
// IMAGE CACHE
// ========================
const imageCache = {};

async function fetchWikiImage(wikiTitle) {
  if (!wikiTitle) return null;
  if (imageCache[wikiTitle]) return imageCache[wikiTitle];
  try {
    const resp = await fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(wikiTitle)}`);
    const data = await resp.json();
    if (data.thumbnail && data.thumbnail.source) {
      const url = data.thumbnail.source.replace(/\/\d+px-/, '/600px-');
      imageCache[wikiTitle] = url;
      return url;
    }
  } catch(e) { console.log('Wiki fetch error:', wikiTitle, e); }
  return null;
}

// Preload images
async function preloadImages() {
  const promises = CARDS.filter(c => c.wiki).map(c => fetchWikiImage(c.wiki));
  await Promise.allSettled(promises);
}

let currentPage = 'home';

function switchPage(page) {
  currentPage = page;
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));

  const pageMap = { home:'homePage', study:'studyPage', quiz:'quizPage', flashcards:'flashcardsPage', cards:'cardsPage' };
  document.getElementById(pageMap[page]).classList.add('active');
  document.getElementById('nav' + page.charAt(0).toUpperCase() + page.slice(1)).classList.add('active');

  if (page === 'home') updateHome();
  if (page === 'study') initStudy();
  if (page === 'quiz') initQuiz();
  if (page === 'flashcards') initFlashcards();
  if (page === 'cards') initCards();

  window.scrollTo(0, 0);
}

function updateHome() {
  document.getElementById('homeCoins').textContent = state.coins;
  document.getElementById('homeStreak').textContent = state.streak;
  document.getElementById('homeCorrect').textContent = state.totalCorrect;
  document.getElementById('homeCards').textContent = state.collectedCards.length;

  const grid = document.getElementById('unitGrid');
  grid.innerHTML = UNITS.map(u => {
    const unitQs = QUESTIONS.filter(q => q.u === u.id);
    const answered = unitQs.filter(q => state.quizHistory[`${u.id}-${unitQs.indexOf(q)}`]).length;
    const pct = unitQs.length > 0 ? Math.round((answered / unitQs.length) * 100) : 0;
    return `<div class="unit-card" onclick="switchPage('study')">
      <div class="unit-icon" style="background:${u.color}15;color:${u.color}">${u.icon}</div>
      <div class="unit-card-info">
        <div class="unit-card-title">Unit ${u.id}: ${u.name}</div>
        <div class="unit-card-topics">${u.topics.length} topics · ${unitQs.length} questions</div>
        <div class="unit-card-progress">
          <div class="unit-card-progress-fill" style="width:${pct}%;background:${u.color}"></div>
        </div>
      </div>
    </div>`;
  }).join('');

  // Missed questions
  const missedDiv = document.getElementById('missedList');
  if (state.missedQuestions.length === 0) {
    missedDiv.innerHTML = '<p style="padding:0 4px;font-size:0.88rem;color:var(--text-light);">No missed questions yet. Start a quiz!</p>';
  } else {
    missedDiv.innerHTML = state.missedQuestions.slice(-10).reverse().map(m => {
      return `<div class="missed-item">
        <div>${m.question}</div>
        <div class="correct-ans">✓ ${m.correctAnswer}</div>
      </div>`;
    }).join('');
  }
}

let quizState = { unit: null, questions: [], current: 0, score: 0, answered: false };

function initQuiz() {
  const sel = document.getElementById('quizUnitSelect');
  document.getElementById('quizContainer').style.display = 'none';
  sel.style.display = 'block';
  sel.innerHTML = UNITS.map(u => {
    const count = QUESTIONS.filter(q => q.u === u.id).length;
    return `<button class="quiz-unit-btn" onclick="startQuiz(${u.id})">
      ${u.icon} Unit ${u.id}: ${u.name}
      <span class="quiz-badge">${count} Qs</span>
    </button>`;
  }).join('') + `<button class="quiz-unit-btn" onclick="startQuiz(0)" style="border-color:var(--accent);">
    🎯 All Units Mixed
    <span class="quiz-badge">${QUESTIONS.length} Qs</span>
  </button>`;
}

function shuffleArray(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function startQuiz(unitId) {
  let qs = unitId === 0 ? [...QUESTIONS] : QUESTIONS.filter(q => q.u === unitId);
  qs = shuffleArray(qs).slice(0, 20); // Max 20 per session
  quizState = { unit: unitId, questions: qs, current: 0, score: 0, answered: false };
  document.getElementById('quizUnitSelect').style.display = 'none';
  document.getElementById('quizContainer').style.display = 'block';
  renderQuizQuestion();
}

function renderQuizQuestion() {
  const container = document.getElementById('quizContainer');
  const q = quizState.questions[quizState.current];
  const total = quizState.questions.length;
  const pct = ((quizState.current) / total) * 100;

  // Shuffle choices while tracking correct
  const indices = q.choices.map((c, i) => i);
  const shuffled = shuffleArray(indices);
  quizState.shuffledIndices = shuffled;

  let stimulusHTML = '';
  if (q.stimulus) {
    stimulusHTML = `<div class="stimulus-box">${q.stimulus.text}<div class="stimulus-source">— ${q.stimulus.source}</div></div>`;
  }

  container.innerHTML = `
    <div class="quiz-progress">
      <div class="quiz-progress-bar"><div class="quiz-progress-fill" style="width:${pct}%"></div></div>
      <div class="quiz-progress-text">${quizState.current + 1}/${total}</div>
    </div>
    <div class="quiz-question-card">
      ${stimulusHTML}
      <div class="quiz-q-text">${q.q}</div>
      <div class="quiz-choices">
        ${shuffled.map((origIdx, displayIdx) => `<button class="quiz-choice" onclick="selectAnswer(${displayIdx})" data-orig="${origIdx}">${q.choices[origIdx]}</button>`).join('')}
      </div>
      <div id="quizFeedback"></div>
    </div>
  `;
  quizState.answered = false;
}

function selectAnswer(displayIdx) {
  if (quizState.answered) return;
  quizState.answered = true;

  const q = quizState.questions[quizState.current];
  const origIdx = quizState.shuffledIndices[displayIdx];
  const isCorrect = origIdx === q.correct;

  const btns = document.querySelectorAll('.quiz-choice');
  btns.forEach((btn, i) => {
    btn.classList.add('disabled');
    const oi = parseInt(btn.dataset.orig);
    if (oi === q.correct) btn.classList.add('correct');
    if (i === displayIdx && !isCorrect) btn.classList.add('incorrect');
  });

  if (isCorrect) {
    quizState.score++;
    state.totalCorrect++;
    state.coins++;
    state.correctInRow++;
    state.streak = Math.max(state.streak, state.correctInRow);

    if (state.correctInRow % 3 === 0) {
      showToast('🎴 3 in a row! Free card pack earned!');
      state.coins += 3;
    }
  } else {
    state.correctInRow = 0;
    // Add to missed
    state.missedQuestions.push({
      question: q.q.substring(0, 120) + (q.q.length > 120 ? '...' : ''),
      correctAnswer: q.choices[q.correct]
    });
    if (state.missedQuestions.length > 50) state.missedQuestions = state.missedQuestions.slice(-50);
  }

  saveState();

  const feedback = document.getElementById('quizFeedback');
  feedback.innerHTML = `
    <div class="quiz-explanation">
      ${isCorrect ? '✅ Correct!' : '❌ Incorrect.'} ${q.explanation}
      <br><span class="key-concept">${q.concept}</span>
    </div>
    <button class="quiz-next-btn" onclick="nextQuestion()">${quizState.current < quizState.questions.length - 1 ? 'Next Question →' : 'See Results'}</button>
  `;
}

function nextQuestion() {
  quizState.current++;
  if (quizState.current >= quizState.questions.length) {
    showQuizResults();
  } else {
    renderQuizQuestion();
  }
}

function showQuizResults() {
  const container = document.getElementById('quizContainer');
  const pct = Math.round((quizState.score / quizState.questions.length) * 100);
  let msg = pct >= 90 ? '🌟 Outstanding!' : pct >= 70 ? '💪 Great work!' : pct >= 50 ? '📚 Keep studying!' : '🔄 Review the material and try again!';
  container.innerHTML = `
    <div class="quiz-results">
      <div class="quiz-results-score">${pct}%</div>
      <div class="quiz-results-label">${quizState.score} of ${quizState.questions.length} correct</div>
      <div class="quiz-results-msg">${msg}</div>
      <button class="quiz-next-btn" onclick="initQuiz()" style="margin-top:20px;">Try Another Quiz</button>
      <button class="quiz-next-btn" onclick="switchPage('home')" style="margin-top:8px;background:var(--dark);">Back to Home</button>
    </div>
  `;
}

// ========================
let fcState = { unit: 1, cards: [], index: 0, flipped: false };

function initFlashcards() {
  const tabs = document.getElementById('flashcardUnitTabs');
  tabs.innerHTML = UNITS.map(u =>
    `<button class="sub-tab ${u.id === fcState.unit ? 'active' : ''}" onclick="selectFlashcardUnit(${u.id})">${u.icon} Unit ${u.id}</button>`
  ).join('') + `<button class="sub-tab ${fcState.unit === 0 ? 'active' : ''}" onclick="selectFlashcardUnit(0)">🎯 All</button>`;
  loadFlashcards();
}

function selectFlashcardUnit(uid) {
  fcState.unit = uid;
  fcState.index = 0;
  fcState.flipped = false;
  document.querySelectorAll('#flashcardUnitTabs .sub-tab').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');
  loadFlashcards();
}

function loadFlashcards() {
  let cards = fcState.unit === 0 ? [...FLASHCARDS] : FLASHCARDS.filter(f => f.unit === fcState.unit);
  fcState.cards = shuffleArray(cards);
  fcState.index = 0;
  fcState.flipped = false;
  renderFlashcard();
}

function renderFlashcard() {
  const container = document.getElementById('flashcardContainer');
  if (fcState.cards.length === 0) {
    container.innerHTML = '<p style="text-align:center;color:var(--text-light);padding:40px;">No flashcards for this unit.</p>';
    return;
  }
  const card = fcState.cards[fcState.index];
  container.innerHTML = `
    <div class="flashcard-counter">${fcState.index + 1} / ${fcState.cards.length}</div>
    <div class="flashcard ${fcState.flipped ? 'flipped' : ''}" onclick="flipCard()">
      <div class="flashcard-label">${fcState.flipped ? '⬆ TERM' : '📖 DEFINITION'}</div>
      <div class="flashcard-text">${fcState.flipped ? card.back : card.front}</div>
      ${!fcState.flipped ? '<div class="flashcard-hint">Tap to reveal term</div>' : ''}
    </div>
    <div class="flashcard-nav">
      <button class="flashcard-nav-btn" onclick="prevCard()" ${fcState.index === 0 ? 'disabled style="opacity:0.4"' : ''}>← Prev</button>
      <button class="flashcard-nav-btn" onclick="loadFlashcards()">🔀 Shuffle</button>
      <button class="flashcard-nav-btn primary" onclick="nextCard()" ${fcState.index === fcState.cards.length - 1 ? 'disabled style="opacity:0.4"' : ''}>Next →</button>
    </div>
  `;
}

function flipCard() { fcState.flipped = !fcState.flipped; renderFlashcard(); }
function nextCard() { if (fcState.index < fcState.cards.length - 1) { fcState.index++; fcState.flipped = false; renderFlashcard(); } }
function prevCard() { if (fcState.index > 0) { fcState.index--; fcState.flipped = false; renderFlashcard(); } }

// ========================
let cardFilter = 'all';

function initCards() {
  document.getElementById('cardsCoins').textContent = state.coins;
  document.getElementById('cardsCollected').textContent = state.collectedCards.length;

  const isComplete = state.collectedCards.length >= CARDS.length;
  document.getElementById('collectionBanner').innerHTML = isComplete ?
    '<div class="collection-complete">🏆 Collection Complete! You are an AP Psychology Master! 🏆</div>' : '';
  document.getElementById('packBtn').disabled = isComplete || state.coins < 3;

  // Filters
  const rarities = ['all','Common','Uncommon','Rare','Epic','Legendary','Mythical'];
  document.getElementById('cardFilters').innerHTML = rarities.map(r =>
    `<button class="filter-btn ${cardFilter === r ? 'active' : ''}" onclick="setCardFilter('${r}')">${r === 'all' ? 'All' : r}</button>`
  ).join('');

  renderCollection();
}

function setCardFilter(f) {
  cardFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  renderCollection();
}

function renderCollection() {
  const grid = document.getElementById('collectionGrid');
  let filtered = cardFilter === 'all' ? CARDS : CARDS.filter(c => c.rarity === cardFilter);

  grid.innerHTML = filtered.map(card => {
    const owned = state.collectedCards.includes(card.id);
    const img = owned ? (card.isTeacher ? (card.id === 41 ? TEACHER_IMAGES.cole : TEACHER_IMAGES.harmon) : (card.wiki && imageCache[card.wiki] ? imageCache[card.wiki] : null)) : null;
    const elementIcon = card.element.split(' ')[0];

    if (!owned) {
      return `<div class="mini-card locked">
        <div style="height:80px;"></div>
        <div class="mini-card-name">???</div>
        <div class="mini-card-rarity" style="color:${getRarityColor(card.rarity)}">${card.rarity}</div>
      </div>`;
    }
    return `<div class="mini-card" style="border-color:${getRarityColor(card.rarity)}" onclick="showCardDetail(${card.id})">
      ${img ? `<img class="mini-card-img" src="${img}" alt="${card.name}" loading="lazy">` : `<div class="mini-card-img" style="display:flex;align-items:center;justify-content:center;font-size:2rem;">${elementIcon}</div>`}
      <div class="mini-card-name">${card.name}</div>
      <div class="mini-card-rarity" style="color:${getRarityColor(card.rarity)}">${getRarityStars(card.rarity)}</div>
    </div>`;
  }).join('');
}

function getRarityColor(r) {
  return {Common:'#9ca3af',Uncommon:'#22c55e',Rare:'#3b82f6',Epic:'#8b5cf6',Legendary:'#f59e0b',Mythical:'#ec4899'}[r] || '#999';
}

function getRarityStars(r) {
  return {Common:'★',Uncommon:'★★',Rare:'★★★',Epic:'★★★★',Legendary:'★★★★★',Mythical:'✦✦✦✦✦✦'}[r] || '★';
}

function getRarityClass(r) {
  return 'rarity-' + r.toLowerCase();
}

// ========================
// CARD DETAIL MODAL
// ========================
function showCardDetail(cardId) {
  const card = CARDS.find(c => c.id === cardId);
  if (!card) return;

  const modal = document.getElementById('cardModal');
  const img = card.isTeacher ? (card.id === 41 ? TEACHER_IMAGES.cole : TEACHER_IMAGES.harmon) : (card.wiki && imageCache[card.wiki] ? imageCache[card.wiki] : null);
  const elementIcon = card.element.split(' ')[0];
  const isMythical = card.rarity === 'Mythical';

  document.getElementById('cardModalContent').innerHTML = `
    <div class="full-card ${getRarityClass(card.rarity)} ${isMythical ? 'mythical-pulse' : ''}">
      <div class="full-card-inner holo-shimmer">
        <div class="full-card-header">
          <div class="full-card-name">${card.name}</div>
          <div class="full-card-hp">♥ ${card.hp}</div>
        </div>
        <div class="full-card-element">${card.element}</div>
        <div class="full-card-img-container">
          ${img ? `<img class="full-card-img" src="${img}" alt="${card.name}">` : `<div class="full-card-img-fallback">${elementIcon}</div>`}
        </div>
        <div class="full-card-type-badge">${card.type}</div>
        <div class="full-card-title">${card.title}</div>
        <div class="full-card-years">${card.years}</div>
        <div class="full-card-fact">${card.fact}</div>
        <div class="full-card-footer">
          <div class="full-card-stars" style="color:${getRarityColor(card.rarity)}">${getRarityStars(card.rarity)}</div>
          <div class="full-card-rarity" style="color:${getRarityColor(card.rarity)}">${card.rarity}</div>
          <div class="full-card-number">#${String(card.id).padStart(3,'0')}</div>
        </div>
      </div>
    </div>
  `;
  modal.classList.add('active');
}

function closeCardModal(e) {
  if (e.target === document.getElementById('cardModal')) {
    document.getElementById('cardModal').classList.remove('active');
  }
}

// ========================
// PACK OPENING
// ========================
let packCards = [];
let packIndex = 0;

function openPack() {
  if (state.coins < 3) { showToast('Not enough coins!'); return; }
  if (state.collectedCards.length >= CARDS.length) { showToast('Collection complete!'); return; }

  state.coins -= 3;
  saveState();

  // Draw 3 cards
  packCards = [];
  for (let i = 0; i < 3; i++) {
    const card = drawCard();
    if (card) packCards.push(card);
  }

  if (packCards.length === 0) { showToast('All cards collected!'); initCards(); return; }

  packIndex = 0;
  const overlay = document.getElementById('packOpening');
  overlay.classList.add('active');
  revealPackCard();
}

function drawCard() {
  const uncollected = CARDS.filter(c => !state.collectedCards.includes(c.id));
  if (uncollected.length === 0) return null;

  // Weighted by rarity
  const weights = {Common:40,Uncommon:28,Rare:18,Epic:10,Legendary:4,Mythical:1};
  let pool = [];
  for (const card of uncollected) {
    const w = weights[card.rarity] || 1;
    for (let i = 0; i < w; i++) pool.push(card);
  }
  // If pool empty, fallback
  if (pool.length === 0) return uncollected[0];

  const selected = pool[Math.floor(Math.random() * pool.length)];
  state.collectedCards.push(selected.id);
  saveState();
  return selected;
}

function revealPackCard() {
  if (packIndex >= packCards.length) {
    document.getElementById('packOpening').classList.remove('active');
    initCards();
    return;
  }

  const card = packCards[packIndex];
  const img = card.isTeacher ? (card.id === 41 ? TEACHER_IMAGES.cole : TEACHER_IMAGES.harmon) : (card.wiki && imageCache[card.wiki] ? imageCache[card.wiki] : null);
  const elementIcon = card.element.split(' ')[0];
  const isMythical = card.rarity === 'Mythical';

  document.getElementById('packRevealArea').innerHTML = `
    <div class="pack-card-reveal">
      <div class="full-card ${getRarityClass(card.rarity)} ${isMythical ? 'mythical-pulse' : ''}">
        <div class="full-card-inner holo-shimmer">
          <div class="full-card-header">
            <div class="full-card-name">${card.name}</div>
            <div class="full-card-hp">♥ ${card.hp}</div>
          </div>
          <div class="full-card-element">${card.element}</div>
          <div class="full-card-img-container">
            ${img ? `<img class="full-card-img" src="${img}" alt="${card.name}">` : `<div class="full-card-img-fallback">${elementIcon}</div>`}
          </div>
          <div class="full-card-type-badge">${card.type}</div>
          <div class="full-card-title">${card.title}</div>
          <div class="full-card-years">${card.years}</div>
          <div class="full-card-fact">${card.fact}</div>
          <div class="full-card-footer">
            <div class="full-card-stars" style="color:${getRarityColor(card.rarity)}">${getRarityStars(card.rarity)}</div>
            <div class="full-card-rarity" style="color:${getRarityColor(card.rarity)}">${card.rarity}</div>
            <div class="full-card-number">#${String(card.id).padStart(3,'0')}</div>
          </div>
        </div>
      </div>
    </div>
  `;

  document.getElementById('packTapText').textContent =
    packIndex < packCards.length - 1 ? `Card ${packIndex + 1}/${packCards.length} — Tap for next` : 'Tap to close';
}

function handlePackTap() {
  packIndex++;
  revealPackCard();
}

// ========================
// TOAST
// ========================
function showToast(msg) {
  const toast = document.createElement('div');
  toast.className = 'toast';
  toast.textContent = msg;
  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), 2200);
}

// ========================
// INIT
// ========================
async function init() {
  loadState();
  updateHome();

  // Start image preloading
  await preloadImages();

  // Hide loading screen
  document.getElementById('loadingScreen').classList.add('hidden');
  setTimeout(() => document.getElementById('loadingScreen').style.display = 'none', 500);
}

init();
</script>
