<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AP Psychology Review</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Source+Sans+3:wght@300;400;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f0eadf;
  --card-bg: #fffdf8;
  --dark: #1a1a2e;
  --accent: #6c5ce7;
  --accent2: #a855f7;
  --gold: #f0a500;
  --green: #2ecc71;
  --red: #e74c3c;
  --blue: #3498db;
  --text: #2d2d2d;
  --text-light: #6b6b6b;
  --border: #d5cec3;
  --science: #3b82f6;
  --behavior: #10b981;
  --mind: #8b5cf6;
  --growth: #22c55e;
  --social: #f59e0b;
  --health: #ef4444;
  --wisdom: #fbbf24;
  --common-border: #9ca3af;
  --uncommon-border: #22c55e;
  --rare-border: #3b82f6;
  --epic-border: #8b5cf6;
  --legendary-border: #f59e0b;
  --mythical-border: #ec4899;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body {
  font-family:'Source Sans 3',sans-serif;
  background:var(--bg);
  color:var(--text);
  max-width:480px;
  margin:0 auto;
  min-height:100vh;
  position:relative;
  overflow-x:hidden;
}
body::before {
  content:'';
  position:fixed;
  top:0;left:0;right:0;bottom:0;
  background-image:
    radial-gradient(circle at 20% 30%, rgba(108,92,231,0.04) 0%, transparent 50%),
    radial-gradient(circle at 80% 70%, rgba(168,85,247,0.04) 0%, transparent 50%),
    url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M30 5 Q35 15 30 25 Q25 15 30 5' fill='none' stroke='%236c5ce720' stroke-width='0.5'/%3E%3Ccircle cx='30' cy='30' r='8' fill='none' stroke='%236c5ce710' stroke-width='0.5'/%3E%3Cpath d='M15 45 Q20 35 25 45' fill='none' stroke='%236c5ce710' stroke-width='0.5'/%3E%3Cpath d='M35 45 Q40 35 45 45' fill='none' stroke='%236c5ce710' stroke-width='0.5'/%3E%3C/svg%3E");
  background-size: cover, cover, 60px 60px;
  pointer-events:none;
  z-index:0;
  max-width:480px;
  margin:0 auto;
}
.app { position:relative; z-index:1; padding-bottom:70px; }

/* Loading Screen */
.loading-screen {
  position:fixed;top:0;left:0;right:0;bottom:0;
  background:var(--dark);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  z-index:9999;
  transition:opacity 0.5s;
  max-width:480px;margin:0 auto;
}
.loading-screen.hidden { opacity:0; pointer-events:none; }
.loading-brain {
  width:80px;height:80px;
  border:4px solid rgba(108,92,231,0.3);
  border-top-color:var(--accent);
  border-radius:50%;
  animation:spin 1s linear infinite;
}
@keyframes spin { to { transform:rotate(360deg); } }
.loading-text {
  font-family:'Playfair Display',serif;
  color:white;font-size:1.2rem;
  margin-top:20px;
  animation:pulse 1.5s ease-in-out infinite;
}
@keyframes pulse { 0%,100%{opacity:0.5} 50%{opacity:1} }

/* Navigation */
.bottom-nav {
  position:fixed;bottom:0;left:0;right:0;
  background:var(--dark);
  display:flex;justify-content:space-around;
  padding:8px 0 calc(8px + env(safe-area-inset-bottom));
  z-index:100;
  max-width:480px;margin:0 auto;
  border-top:2px solid var(--accent);
}
.nav-btn {
  background:none;border:none;color:#888;
  font-family:'Source Sans 3',sans-serif;
  font-size:0.7rem;font-weight:600;
  display:flex;flex-direction:column;align-items:center;gap:3px;
  cursor:pointer;padding:4px 12px;
  transition:color 0.2s;
}
.nav-btn.active { color:var(--accent); }
.nav-btn svg { width:22px;height:22px; }

/* Hero Section */
.hero-card {
  background:var(--dark);
  margin:12px;
  border-radius:16px;
  padding:28px 20px;
  position:relative;
  overflow:hidden;
}
.hero-card::before {
  content:'Ψ';
  position:absolute;
  font-size:200px;
  font-family:'Playfair Display',serif;
  color:rgba(108,92,231,0.06);
  top:-30px;right:-20px;
  font-weight:900;
}
.hero-card::after {
  content:'';
  position:absolute;top:0;left:0;right:0;bottom:0;
  background:repeating-linear-gradient(
    45deg,transparent,transparent 10px,
    rgba(108,92,231,0.03) 10px,rgba(108,92,231,0.03) 11px
  );
}
.hero-title {
  font-family:'Playfair Display',serif;
  font-size:1.8rem;font-weight:900;
  color:white;position:relative;z-index:1;
  line-height:1.2;
}
.hero-subtitle {
  color:var(--accent);font-size:0.9rem;
  font-weight:600;margin-top:6px;
  position:relative;z-index:1;
  letter-spacing:1px;text-transform:uppercase;
}
.hero-stats {
  display:flex;gap:16px;margin-top:16px;
  position:relative;z-index:1;
}
.hero-stat {
  background:rgba(108,92,231,0.15);
  border-radius:10px;padding:10px 14px;
  flex:1;text-align:center;
}
.hero-stat-val {
  font-family:'JetBrains Mono',monospace;
  color:white;font-size:1.3rem;font-weight:700;
}
.hero-stat-label {
  color:#999;font-size:0.7rem;
  text-transform:uppercase;letter-spacing:0.5px;
  margin-top:2px;
}

/* Section Headers */
.section-header {
  font-family:'Playfair Display',serif;
  font-size:1.3rem;font-weight:700;
  padding:20px 16px 10px;
  color:var(--dark);
}

/* Unit Cards on Home */
.unit-grid { padding:0 12px 12px; display:flex; flex-direction:column; gap:10px; }
.unit-card {
  background:var(--card-bg);
  border-radius:12px;
  padding:16px;
  border:1px solid var(--border);
  cursor:pointer;
  transition:transform 0.15s, box-shadow 0.15s;
  display:flex;align-items:center;gap:14px;
}
.unit-card:active { transform:scale(0.98); }
.unit-icon {
  width:48px;height:48px;
  border-radius:12px;
  display:flex;align-items:center;justify-content:center;
  font-size:1.4rem;flex-shrink:0;
}
.unit-card-info { flex:1; }
.unit-card-title { font-weight:700;font-size:0.95rem; }
.unit-card-topics { color:var(--text-light);font-size:0.8rem;margin-top:2px; }
.unit-card-progress {
  height:4px;background:#e5e5e5;border-radius:2px;
  margin-top:8px;overflow:hidden;
}
.unit-card-progress-fill {
  height:100%;border-radius:2px;
  transition:width 0.3s;
}

/* Page containers */
.page { display:none; }
.page.active { display:block; }

/* Study View */
.study-topic-list { padding:0 12px 12px; display:flex; flex-direction:column; gap:8px; }
.study-topic-btn {
  background:var(--card-bg);border:1px solid var(--border);
  border-radius:10px;padding:14px 16px;
  text-align:left;cursor:pointer;
  font-family:'Source Sans 3',sans-serif;
  font-size:0.95rem;font-weight:600;
  display:flex;align-items:center;justify-content:between;
  transition:transform 0.15s;
  width:100%;
}
.study-topic-btn:active { transform:scale(0.98); }
.study-content {
  padding:16px;
  animation:fadeIn 0.3s;
}
@keyframes fadeIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
.study-section {
  background:var(--card-bg);
  border:1px solid var(--border);
  border-radius:12px;
  padding:16px;margin-bottom:12px;
}
.study-section h3 {
  font-family:'Playfair Display',serif;
  font-size:1.05rem;margin-bottom:8px;
  color:var(--dark);
}
.study-section p {
  font-size:0.9rem;line-height:1.6;
  color:var(--text);
}
.study-section strong { color:var(--accent); font-weight:700; }

/* Back buttons */
.back-btn {
  background:none;border:none;
  font-family:'Source Sans 3',sans-serif;
  font-size:0.9rem;font-weight:600;
  color:var(--accent);cursor:pointer;
  padding:12px 16px;
  display:flex;align-items:center;gap:6px;
}

/* Quiz */
.quiz-unit-select { padding:0 12px 12px; display:flex; flex-direction:column; gap:8px; }
.quiz-unit-btn {
  background:var(--card-bg);border:1px solid var(--border);
  border-radius:10px;padding:14px 16px;
  text-align:left;cursor:pointer;
  font-family:'Source Sans 3',sans-serif;
  font-size:0.95rem;font-weight:600;
  transition:transform 0.15s;width:100%;
  display:flex;justify-content:space-between;align-items:center;
}
.quiz-unit-btn:active { transform:scale(0.98); }
.quiz-badge {
  background:var(--accent);color:white;
  font-size:0.7rem;padding:2px 8px;
  border-radius:10px;font-family:'JetBrains Mono',monospace;
}
.quiz-container {
  padding:12px;
  animation:fadeIn 0.3s;
}
.quiz-progress {
  display:flex;align-items:center;gap:10px;
  margin-bottom:16px;
}
.quiz-progress-bar {
  flex:1;height:6px;background:#e5e5e5;
  border-radius:3px;overflow:hidden;
}
.quiz-progress-fill {
  height:100%;background:var(--accent);
  border-radius:3px;transition:width 0.3s;
}
.quiz-progress-text {
  font-family:'JetBrains Mono',monospace;
  font-size:0.8rem;color:var(--text-light);
  white-space:nowrap;
}
.quiz-question-card {
  background:var(--card-bg);
  border:1px solid var(--border);
  border-radius:14px;padding:20px;
  margin-bottom:12px;
}
.quiz-q-text {
  font-size:0.95rem;line-height:1.6;
  margin-bottom:16px;font-weight:500;
}
.stimulus-box {
  background:#f8f5f0;
  border-left:3px solid var(--accent);
  padding:12px 14px;
  margin-bottom:14px;
  border-radius:0 8px 8px 0;
  font-style:italic;
  font-size:0.88rem;
  line-height:1.5;
  color:#444;
}
.stimulus-source {
  font-style:normal;font-size:0.75rem;
  color:var(--text-light);margin-top:6px;
  text-align:right;
}
.quiz-choices { display:flex; flex-direction:column; gap:8px; }
.quiz-choice {
  background:white;border:2px solid var(--border);
  border-radius:10px;padding:12px 14px;
  cursor:pointer;font-size:0.9rem;
  line-height:1.4;transition:all 0.2s;
  text-align:left;width:100%;
  font-family:'Source Sans 3',sans-serif;
}
.quiz-choice:active { transform:scale(0.98); }
.quiz-choice.selected { border-color:var(--accent);background:rgba(108,92,231,0.05); }
.quiz-choice.correct { border-color:var(--green);background:rgba(46,204,113,0.1); }
.quiz-choice.incorrect { border-color:var(--red);background:rgba(231,76,60,0.1); }
.quiz-choice.disabled { pointer-events:none; }
.quiz-explanation {
  background:#f0ecff;
  border-radius:10px;padding:14px;
  margin-top:12px;font-size:0.88rem;
  line-height:1.5;
  animation:fadeIn 0.3s;
}
.quiz-explanation .key-concept {
  display:inline-block;
  background:var(--accent);color:white;
  font-size:0.72rem;font-weight:700;
  padding:2px 8px;border-radius:6px;
  margin-top:8px;text-transform:uppercase;
  letter-spacing:0.5px;
}
.quiz-next-btn {
  background:var(--accent);color:white;
  border:none;border-radius:10px;
  padding:12px 24px;font-size:0.95rem;
  font-weight:600;cursor:pointer;
  width:100%;margin-top:12px;
  font-family:'Source Sans 3',sans-serif;
  transition:background 0.2s;
}
.quiz-next-btn:active { background:var(--accent2); }
.quiz-results {
  text-align:center;padding:30px 16px;
  animation:fadeIn 0.4s;
}
.quiz-results-score {
  font-family:'JetBrains Mono',monospace;
  font-size:3rem;font-weight:700;
  color:var(--accent);
}
.quiz-results-label {
  font-size:1rem;color:var(--text-light);
  margin-top:4px;
}
.quiz-results-msg {
  font-family:'Playfair Display',serif;
  font-size:1.3rem;margin-top:16px;
  color:var(--dark);
}

/* Flashcards */
.flashcard-container { padding:12px;text-align:center; }
.flashcard-counter {
  font-family:'JetBrains Mono',monospace;
  font-size:0.85rem;color:var(--text-light);
  margin-bottom:12px;
}
.flashcard {
  background:var(--card-bg);
  border:2px solid var(--border);
  border-radius:16px;
  padding:40px 24px;
  min-height:250px;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  cursor:pointer;
  transition:transform 0.3s;
  position:relative;
}
.flashcard.flipped { background:linear-gradient(135deg,#f0ecff,#fffdf8); border-color:var(--accent); }
.flashcard-label {
  position:absolute;top:12px;left:16px;
  font-size:0.7rem;text-transform:uppercase;
  letter-spacing:1px;font-weight:700;
  color:var(--text-light);
}
.flashcard-text {
  font-size:1.05rem;line-height:1.6;
  max-width:340px;
}
.flashcard.flipped .flashcard-text {
  font-family:'Playfair Display',serif;
  font-size:1.4rem;font-weight:700;
  color:var(--accent);
}
.flashcard-hint {
  font-size:0.75rem;color:var(--text-light);
  margin-top:12px;
}
.flashcard-nav {
  display:flex;gap:12px;margin-top:16px;
  justify-content:center;
}
.flashcard-nav-btn {
  background:var(--card-bg);border:1px solid var(--border);
  border-radius:10px;padding:10px 24px;
  cursor:pointer;font-family:'Source Sans 3',sans-serif;
  font-size:0.9rem;font-weight:600;
  transition:all 0.15s;
}
.flashcard-nav-btn:active { transform:scale(0.95); }
.flashcard-nav-btn.primary {
  background:var(--accent);color:white;border-color:var(--accent);
}

/* Cards Collection */
.cards-header {
  display:flex;justify-content:space-between;
  align-items:center;padding:0 16px;margin-bottom:12px;
}
.cards-coins {
  font-family:'JetBrains Mono',monospace;
  font-size:0.9rem;font-weight:700;
  color:var(--gold);
  display:flex;align-items:center;gap:4px;
}
.cards-collected {
  font-size:0.8rem;color:var(--text-light);
}
.pack-btn {
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:white;border:none;border-radius:12px;
  padding:14px;width:calc(100% - 24px);
  margin:0 12px 16px;cursor:pointer;
  font-family:'Playfair Display',serif;
  font-size:1.1rem;font-weight:700;
  position:relative;overflow:hidden;
  transition:transform 0.15s;
}
.pack-btn:active { transform:scale(0.97); }
.pack-btn:disabled {
  background:#ccc;cursor:not-allowed;
  transform:none;
}
.pack-btn .cost {
  font-family:'JetBrains Mono',monospace;
  font-size:0.8rem;font-weight:400;
  display:block;margin-top:2px;opacity:0.9;
}
.collection-grid {
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:8px;padding:0 12px 12px;
}
.mini-card {
  background:var(--card-bg);
  border:2px solid var(--border);
  border-radius:10px;
  padding:8px;text-align:center;
  cursor:pointer;
  transition:transform 0.15s;
  position:relative;overflow:hidden;
}
.mini-card:active { transform:scale(0.95); }
.mini-card.locked {
  background:#eee;opacity:0.5;
  cursor:default;
}
.mini-card.locked::after {
  content:'?';
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);
  font-size:2rem;color:#bbb;font-weight:700;
}
.mini-card-img {
  width:100%;height:80px;
  object-fit:contain;
  border-radius:6px;
  background:#f5f5f5;
}
.mini-card-name {
  font-size:0.7rem;font-weight:600;
  margin-top:4px;
  overflow:hidden;text-overflow:ellipsis;
  white-space:nowrap;
}
.mini-card-rarity {
  font-size:0.6rem;
  margin-top:2px;
}

/* Full Card Modal */
.card-modal {
  position:fixed;top:0;left:0;right:0;bottom:0;
  background:rgba(0,0,0,0.85);
  z-index:200;display:none;
  align-items:center;justify-content:center;
  padding:20px;
  max-width:480px;margin:0 auto;
}
.card-modal.active { display:flex; }
.full-card {
  width:300px;
  border-radius:16px;
  padding:3px;
  position:relative;
  animation:cardReveal 0.5s ease-out;
}
@keyframes cardReveal {
  from{transform:scale(0.5) rotateY(180deg);opacity:0}
  to{transform:scale(1) rotateY(0);opacity:1}
}
.full-card-inner {
  background:#1a1a2e;
  border-radius:14px;
  padding:16px;
  position:relative;
  overflow:hidden;
}
.full-card-header {
  display:flex;justify-content:space-between;
  align-items:center;margin-bottom:10px;
}
.full-card-name {
  font-family:'Playfair Display',serif;
  font-size:1rem;font-weight:700;
  color:white;flex:1;
}
.full-card-hp {
  font-family:'JetBrains Mono',monospace;
  font-size:0.9rem;font-weight:700;
  color:var(--red);
  display:flex;align-items:center;gap:2px;
}
.full-card-element {
  font-size:0.75rem;color:#aaa;margin-bottom:8px;
}
.full-card-img-container {
  width:100%;height:200px;
  background:#2a2a3e;
  border-radius:10px;
  overflow:hidden;
  display:flex;align-items:center;justify-content:center;
  margin-bottom:10px;
}
.full-card-img {
  width:100%;height:100%;
  object-fit:contain;
}
.full-card-img-fallback {
  font-size:4rem;
}
.full-card-type-badge {
  display:inline-block;
  font-size:0.65rem;font-weight:700;
  text-transform:uppercase;letter-spacing:1px;
  padding:2px 8px;border-radius:4px;
  background:rgba(108,92,231,0.3);
  color:var(--accent);margin-bottom:8px;
}
.full-card-title {
  font-size:0.8rem;color:#ccc;
  font-style:italic;margin-bottom:2px;
}
.full-card-years {
  font-family:'JetBrains Mono',monospace;
  font-size:0.72rem;color:#888;
  margin-bottom:8px;
}
.full-card-fact {
  background:rgba(108,92,231,0.1);
  border-radius:8px;padding:10px;
  font-size:0.8rem;line-height:1.5;
  color:#ddd;margin-bottom:10px;
}
.full-card-footer {
  display:flex;justify-content:space-between;
  align-items:center;
}
.full-card-stars { font-size:0.8rem; }
.full-card-number {
  font-family:'JetBrains Mono',monospace;
  font-size:0.7rem;color:#666;
}
.full-card-rarity {
  font-size:0.7rem;font-weight:700;
  text-transform:uppercase;letter-spacing:1px;
}

/* Rarity glows */
.rarity-common { background:linear-gradient(135deg,#9ca3af,#6b7280); }
.rarity-uncommon { background:linear-gradient(135deg,#22c55e,#16a34a); }
.rarity-rare { background:linear-gradient(135deg,#3b82f6,#2563eb); }
.rarity-epic { background:linear-gradient(135deg,#8b5cf6,#7c3aed); }
.rarity-legendary { background:linear-gradient(135deg,#f59e0b,#d97706); }
.rarity-mythical { background:linear-gradient(135deg,#ec4899,#f59e0b,#8b5cf6);background-size:200% 200%;animation:mythGlow 3s ease infinite; }
@keyframes mythGlow { 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }

.mythical-pulse {
  animation:mythPulse 2s ease-in-out infinite;
}
@keyframes mythPulse {
  0%,100%{box-shadow:0 0 20px rgba(236,72,153,0.3)}
  50%{box-shadow:0 0 40px rgba(236,72,153,0.6), 0 0 60px rgba(245,158,11,0.3)}
}

/* Holographic shimmer */
.holo-shimmer::after {
  content:'';
  position:absolute;top:0;left:-100%;
  width:50%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.08),transparent);
  animation:shimmer 3s infinite;
  pointer-events:none;
}
@keyframes shimmer { 0%{left:-100%} 100%{left:200%} }

/* Pack opening animation */
.pack-opening {
  position:fixed;top:0;left:0;right:0;bottom:0;
  background:rgba(0,0,0,0.9);
  z-index:300;display:none;
  align-items:center;justify-content:center;
  flex-direction:column;
  max-width:480px;margin:0 auto;
}
.pack-opening.active { display:flex; }
.pack-card-reveal {
  animation:packReveal 0.8s ease-out;
}
@keyframes packReveal {
  0%{transform:scale(0) rotateY(360deg);opacity:0}
  60%{transform:scale(1.1) rotateY(0);opacity:1}
  100%{transform:scale(1);opacity:1}
}
.pack-tap-text {
  color:white;font-size:0.9rem;
  margin-top:20px;
  animation:pulse 1.5s ease-in-out infinite;
}

/* Collection complete banner */
.collection-complete {
  background:linear-gradient(135deg,#f59e0b,#ec4899);
  color:white;text-align:center;
  padding:12px;margin:0 12px 12px;
  border-radius:10px;
  font-family:'Playfair Display',serif;
  font-weight:700;font-size:1rem;
}

/* Toast notification */
.toast {
  position:fixed;top:20px;left:50%;
  transform:translateX(-50%);
  background:var(--dark);color:white;
  padding:10px 20px;border-radius:10px;
  font-size:0.85rem;font-weight:600;
  z-index:500;
  animation:toastIn 0.3s ease-out, toastOut 0.3s ease-in 1.7s forwards;
  max-width:300px;text-align:center;
}
@keyframes toastIn { from{opacity:0;transform:translateX(-50%) translateY(-20px)} to{opacity:1;transform:translateX(-50%) translateY(0)} }
@keyframes toastOut { to{opacity:0;transform:translateX(-50%) translateY(-20px)} }

/* Missed questions review */
.missed-list { padding:0 12px 12px; }
.missed-item {
  background:var(--card-bg);
  border:1px solid var(--border);
  border-left:3px solid var(--red);
  border-radius:0 10px 10px 0;
  padding:12px;margin-bottom:8px;
  font-size:0.88rem;line-height:1.5;
}
.missed-item .correct-ans {
  color:var(--green);font-weight:600;
  margin-top:4px;font-size:0.82rem;
}

/* Scrollbar */
::-webkit-scrollbar { width:4px; }
::-webkit-scrollbar-thumb { background:var(--border);border-radius:2px; }

/* Tabs within sections */
.sub-tabs {
  display:flex;gap:6px;padding:0 12px 12px;
  overflow-x:auto;
}
.sub-tab {
  background:var(--card-bg);border:1px solid var(--border);
  border-radius:20px;padding:6px 14px;
  font-size:0.8rem;font-weight:600;
  cursor:pointer;white-space:nowrap;
  transition:all 0.2s;
  font-family:'Source Sans 3',sans-serif;
}
.sub-tab.active {
  background:var(--accent);color:white;
  border-color:var(--accent);
}

/* Filter row for cards */
.filter-row {
  display:flex;gap:6px;padding:0 12px 12px;
  overflow-x:auto;flex-wrap:nowrap;
}
.filter-btn {
  background:var(--card-bg);border:1px solid var(--border);
  border-radius:16px;padding:4px 12px;
  font-size:0.72rem;font-weight:600;
  cursor:pointer;white-space:nowrap;
  font-family:'Source Sans 3',sans-serif;
}
.filter-btn.active { background:var(--dark);color:white;border-color:var(--dark); }
</style>

<script>

const UNITS = [
  { id:1, name:"Biological Bases of Behavior", icon:"🧬", color:"#3b82f6",
    topics:["1.1 Interaction of Heredity and Environment","1.2 Overview of the Nervous System","1.3 The Neuron and Neural Firing","1.4 The Brain","1.5 Sleep","1.6 Sensation"]},

  { id:3, name:"Development and Learning", icon:"🌱", color:"#22c55e",
    topics:["3.1 Themes and Methods in Developmental Psychology","3.2 Physical Development Across the Lifespan","3.3 Gender and Sexual Orientation","3.4 Cognitive Development Across the Lifespan","3.5 Communication and Language Development","3.6 Social-Emotional Development Across the Lifespan","3.7 Classical Conditioning","3.8 Operant Conditioning","3.9 Social, Cognitive, and Neurological Factors in Learning"]},
  { id:4, name:"Social Psychology and Personality", icon:"👥", color:"#f59e0b",
    topics:["4.1 Attribution Theory and Person Perception","4.2 Attitude Formation and Attitude Change","4.3 Psychology of Social Situations","4.4 Psychodynamic and Humanistic Theories of Personality","4.5 Social-Cognitive and Trait Theories of Personality","4.6 Motivation","4.7 Emotion"]},
  { id:5, name:"Mental and Physical Health", icon:"💊", color:"#ef4444",
    topics:["5.1 Introduction to Health Psychology","5.2 Positive Psychology","5.3 Explaining and Classifying Psychological Disorders","5.4 Selection of Categories of Psychological Disorders","5.5 Treatment of Psychological Disorders"]}
];

// ========================
// STUDY CONTENT
// ========================
const STUDY = {
"1.1":[
  {title:"Nature vs. Nurture",text:"The <strong>nature-nurture debate</strong> examines how <strong>genetic inheritance</strong> (nature) and <strong>environmental factors</strong> (nurture) interact to shape behavior. Modern psychology recognizes that virtually all traits result from <strong>gene-environment interaction</strong> — genes may predispose, but environment activates or suppresses expression."},
  {title:"Behavioral Genetics",text:"<strong>Twin studies</strong> compare concordance rates between <strong>monozygotic (identical)</strong> and <strong>dizygotic (fraternal)</strong> twins to estimate heritability. <strong>Adoption studies</strong> separate genetic from environmental influences by comparing adopted children to both biological and adoptive parents."},
  {title:"Epigenetics",text:"<strong>Epigenetics</strong> studies how environmental factors can alter <strong>gene expression</strong> without changing the DNA sequence itself. Stress, nutrition, and toxins can add or remove <strong>methyl groups</strong> to DNA, effectively turning genes on or off — sometimes across generations."},
  {title:"Evolutionary Psychology",text:"<strong>Evolutionary psychology</strong> applies <strong>natural selection</strong> principles to explain behavioral tendencies. Traits that enhanced <strong>survival and reproduction</strong> in ancestral environments may persist today — such as fear of snakes or preference for high-calorie foods."}
],
"1.2":[
  {title:"Central and Peripheral Nervous Systems",text:"The <strong>central nervous system (CNS)</strong> consists of the <strong>brain and spinal cord</strong>, serving as the body's command center. The <strong>peripheral nervous system (PNS)</strong> connects the CNS to the rest of the body via sensory and motor neurons."},
  {title:"Somatic vs. Autonomic",text:"The PNS divides into the <strong>somatic nervous system</strong> (voluntary muscle control) and the <strong>autonomic nervous system</strong> (involuntary functions). The autonomic system further splits into <strong>sympathetic</strong> (fight-or-flight arousal) and <strong>parasympathetic</strong> (rest-and-digest calming) divisions."},
  {title:"The Endocrine System",text:"The <strong>endocrine system</strong> communicates via <strong>hormones</strong> released into the bloodstream by glands. The <strong>pituitary gland</strong> (master gland) is regulated by the <strong>hypothalamus</strong> and influences growth, stress, and reproduction. <strong>Adrenal glands</strong> release cortisol and adrenaline during stress."},
  {title:"Neural Communication Overview",text:"Information travels through the nervous system via <strong>electrochemical signals</strong>. <strong>Sensory (afferent) neurons</strong> carry information toward the brain; <strong>motor (efferent) neurons</strong> carry commands away; and <strong>interneurons</strong> connect neurons within the CNS."}
],
"1.3":[
  {title:"Neuron Structure",text:"A typical neuron has <strong>dendrites</strong> (receive signals), a <strong>cell body/soma</strong> (integrates signals), an <strong>axon</strong> (transmits signals), and <strong>terminal buttons</strong> (release neurotransmitters). The <strong>myelin sheath</strong> insulates the axon, speeding transmission via <strong>saltatory conduction</strong>."},
  {title:"Action Potential",text:"Neurons fire via the <strong>all-or-none principle</strong>: if stimulation reaches the <strong>threshold</strong>, the neuron fires at full strength. During the <strong>action potential</strong>, sodium ions rush in (depolarization) and potassium ions flow out (repolarization). The <strong>refractory period</strong> prevents immediate re-firing."},
  {title:"Synaptic Transmission",text:"At the <strong>synapse</strong>, electrical signals become chemical. <strong>Neurotransmitters</strong> are released from <strong>vesicles</strong> in the presynaptic terminal, cross the <strong>synaptic cleft</strong>, and bind to <strong>receptors</strong> on the postsynaptic neuron. Excess neurotransmitters undergo <strong>reuptake</strong> or enzymatic breakdown."},
  {title:"Key Neurotransmitters",text:"<strong>Serotonin</strong> regulates mood and sleep. <strong>Dopamine</strong> affects reward, motivation, and movement. <strong>Acetylcholine</strong> is crucial for muscle action and memory. <strong>GABA</strong> is the main inhibitory neurotransmitter. <strong>Glutamate</strong> is the main excitatory neurotransmitter. <strong>Norepinephrine</strong> modulates arousal and alertness."}
],
"1.4":[
  {title:"Brain Structures & Methods",text:"Psychologists study the brain using <strong>lesion studies</strong>, <strong>EEG</strong> (electrical activity), <strong>CT/MRI</strong> (structure), <strong>PET</strong> (metabolic activity), and <strong>fMRI</strong> (blood flow/activity). Each method offers different trade-offs between <strong>spatial and temporal resolution</strong>."},
  {title:"The Brainstem and Cerebellum",text:"The <strong>medulla</strong> controls vital autonomic functions (breathing, heart rate). The <strong>pons</strong> helps coordinate movement and bridges signals. The <strong>reticular formation</strong> filters sensory input and controls arousal. The <strong>cerebellum</strong> coordinates voluntary movement, balance, and motor learning."},
  {title:"Limbic System",text:"The <strong>thalamus</strong> relays sensory information (except smell) to the cortex. The <strong>hypothalamus</strong> regulates hunger, thirst, body temperature, and the endocrine system. The <strong>amygdala</strong> processes fear and emotional memory. The <strong>hippocampus</strong> is essential for forming new explicit memories."},
  {title:"Cerebral Cortex",text:"The cortex has four <strong>lobes</strong>: <strong>frontal</strong> (planning, personality, motor — includes Broca's area), <strong>parietal</strong> (somatosensory processing), <strong>temporal</strong> (auditory processing, Wernicke's area), and <strong>occipital</strong> (visual processing). <strong>Association areas</strong> integrate complex information across regions."}
],
"1.5":[
  {title:"Sleep Stages",text:"Sleep alternates between <strong>NREM</strong> (stages N1, N2, N3) and <strong>REM</strong> sleep in ~90-minute cycles. <strong>N3 (slow-wave sleep)</strong> features delta waves and is critical for physical restoration. <strong>REM sleep</strong> involves rapid eye movements, near-paralysis, and vivid dreaming."},
  {title:"Sleep Theories",text:"The <strong>restorative theory</strong> proposes sleep repairs the body and consolidates memory. <strong>Evolutionary/adaptive theory</strong> suggests sleep conserves energy and avoids predators. <strong>Memory consolidation</strong> research shows sleep strengthens newly formed neural connections."},
  {title:"Sleep Disorders",text:"<strong>Insomnia</strong> is difficulty falling or staying asleep. <strong>Narcolepsy</strong> involves sudden, uncontrollable episodes of REM sleep. <strong>Sleep apnea</strong> causes repeated breathing interruptions. <strong>Night terrors</strong> occur during N3 sleep and differ from nightmares (which occur in REM)."},
  {title:"Circadian Rhythms",text:"The <strong>circadian rhythm</strong> is a ~24-hour biological clock regulated by the <strong>suprachiasmatic nucleus (SCN)</strong> in the hypothalamus. Light exposure signals the SCN to suppress <strong>melatonin</strong> production from the pineal gland. Disruptions (jet lag, shift work) impair cognition and health."}
],
"1.6":[
  {title:"Transduction & Thresholds",text:"<strong>Sensation</strong> is the detection of physical energy by sensory receptors. <strong>Transduction</strong> converts stimuli into neural signals. The <strong>absolute threshold</strong> is the minimum stimulation needed for detection 50% of the time. The <strong>difference threshold (JND)</strong> is governed by <strong>Weber's law</strong>."},
  {title:"Vision",text:"Light enters through the <strong>cornea</strong>, passes through the <strong>pupil</strong> (controlled by the iris), and is focused by the <strong>lens</strong> onto the <strong>retina</strong>. <strong>Rods</strong> detect dim light; <strong>cones</strong> detect color and detail. Information travels via the <strong>optic nerve</strong> to the visual cortex in the occipital lobe."},
  {title:"Hearing & Other Senses",text:"Sound waves vibrate the <strong>eardrum</strong>, are amplified by <strong>ossicles</strong>, and converted to neural signals by <strong>hair cells</strong> in the <strong>cochlea</strong>. <strong>Place theory</strong> explains high-pitch detection; <strong>frequency theory</strong> explains low-pitch. Smell and taste are <strong>chemical senses</strong> processed differently than vision/hearing."},
  {title:"Signal Detection Theory",text:"<strong>Signal detection theory</strong> explains that detecting a stimulus depends not only on its intensity but also on <strong>psychological factors</strong> like expectation, motivation, and fatigue. Responses are classified as <strong>hits, misses, false alarms, or correct rejections</strong>."}
],
"2.1":[
  {title:"Top-Down vs. Bottom-Up Processing",text:"<strong>Bottom-up processing</strong> builds perception from raw sensory data — stimulus drives interpretation. <strong>Top-down processing</strong> uses existing knowledge, expectations, and context to interpret stimuli. Most perception involves both simultaneously."},
  {title:"Gestalt Principles",text:"<strong>Gestalt psychology</strong> describes how we organize visual elements into wholes. Key principles include <strong>proximity</strong> (grouping nearby items), <strong>similarity</strong> (grouping similar items), <strong>closure</strong> (completing incomplete figures), <strong>continuity</strong> (following smooth lines), and <strong>figure-ground</strong> (distinguishing foreground from background)."},
  {title:"Depth & Motion Perception",text:"<strong>Monocular cues</strong> (linear perspective, relative size, overlap, texture gradient) work with one eye. <strong>Binocular cues</strong> require both eyes: <strong>retinal disparity</strong> (different images from each eye) and <strong>convergence</strong> (eye muscle tension). <strong>Motion perception</strong> includes the phi phenomenon and stroboscopic motion."},
  {title:"Perceptual Constancies & Illusions",text:"<strong>Perceptual constancy</strong> allows us to perceive objects as stable despite changing sensory input — including <strong>size, shape, and color constancy</strong>. <strong>Visual illusions</strong> (e.g., Müller-Lyer) reveal how perceptual assumptions can lead to systematic errors in interpretation."}
],
"2.2":[
  {title:"Concepts & Problem-Solving",text:"<strong>Concepts</strong> are mental categories. We often use <strong>prototypes</strong> (best examples) to categorize. <strong>Problem-solving strategies</strong> include <strong>algorithms</strong> (guaranteed but slow), <strong>heuristics</strong> (fast but fallible), and <strong>insight</strong> (sudden realization). <strong>Fixation</strong> and <strong>mental set</strong> can block creative solutions."},
  {title:"Heuristics and Biases",text:"<strong>Representativeness heuristic</strong>: judging probability by similarity to a prototype (ignoring base rates). <strong>Availability heuristic</strong>: estimating frequency by ease of recall. <strong>Anchoring bias</strong>: over-relying on initial information. <strong>Confirmation bias</strong>: seeking evidence that supports existing beliefs."},
  {title:"Language and Thought",text:"<strong>Whorf's linguistic relativity hypothesis</strong> proposes language shapes thought. The strong version (language determines thought) is largely rejected; the weak version (language influences thought) has empirical support. <strong>Bilingualism</strong> has been associated with cognitive flexibility and executive function benefits."},
  {title:"Decision-Making",text:"<strong>Framing effects</strong> show that how choices are presented influences decisions — people are risk-averse with gains but risk-seeking with losses. <strong>Overconfidence bias</strong> leads people to overestimate their accuracy. <strong>Belief perseverance</strong> is clinging to initial beliefs despite contradictory evidence."}
],
"2.3":[
  {title:"Memory Models",text:"The <strong>Atkinson-Shiffrin model</strong> proposes three stages: <strong>sensory memory</strong> (brief, large capacity), <strong>short-term memory</strong> (limited duration/capacity), and <strong>long-term memory</strong> (relatively permanent, unlimited). <strong>Working memory</strong> (Baddeley) expands STM to include active processing components."},
  {title:"Types of Memory",text:"<strong>Explicit (declarative) memory</strong> includes <strong>semantic</strong> (facts/knowledge) and <strong>episodic</strong> (personal experiences) memory. <strong>Implicit (nondeclarative) memory</strong> includes <strong>procedural memory</strong> (skills/habits) and classically conditioned associations. Implicit memory operates without conscious awareness."},
  {title:"Sensory Memory",text:"<strong>Iconic memory</strong> stores visual information for about 0.5 seconds (Sperling's partial report). <strong>Echoic memory</strong> stores auditory information for 3–4 seconds. Sensory memory has large capacity but rapid decay — only attended items move to short-term memory."},
  {title:"Working Memory Capacity",text:"Short-term memory holds about <strong>7 ± 2 items</strong> (Miller's magic number). <strong>Chunking</strong> groups items into meaningful units to expand effective capacity. <strong>Working memory</strong> actively manipulates information and relies on the <strong>central executive, phonological loop, and visuospatial sketchpad</strong>."}
],
"2.4":[
  {title:"Encoding Strategies",text:"<strong>Elaborative rehearsal</strong> (connecting new info to existing knowledge) produces stronger encoding than <strong>maintenance rehearsal</strong> (simple repetition). <strong>Semantic encoding</strong> (processing meaning) is deepest and most effective. <strong>Visual and acoustic encoding</strong> are shallower alternatives."},
  {title:"Levels of Processing",text:"<strong>Craik and Lockhart's levels of processing</strong> framework shows that <strong>deeper processing</strong> (analyzing meaning) creates more durable memories than <strong>shallow processing</strong> (analyzing appearance or sound). <strong>Self-referencing</strong> — relating material to yourself — enhances encoding further."},
  {title:"Encoding Context Effects",text:"<strong>Context-dependent memory</strong>: recall improves when the retrieval environment matches the encoding environment. <strong>State-dependent memory</strong>: recall improves when internal state (mood, arousal) at retrieval matches encoding. Both demonstrate <strong>encoding specificity principle</strong> (Tulving)."},
  {title:"Mnemonic Devices",text:"<strong>Mnemonic devices</strong> are encoding strategies that impose structure. <strong>Method of loci</strong> associates items with physical locations. <strong>Peg-word system</strong> links items to a pre-memorized sequence. <strong>Acronyms and acrostics</strong> organize first letters. All leverage <strong>visual imagery</strong> and organization."}
],
"2.5":[
  {title:"Long-Term Potentiation",text:"<strong>Long-term potentiation (LTP)</strong> is the strengthening of synaptic connections through repeated stimulation — the neural basis of learning and memory. LTP occurs prominently in the <strong>hippocampus</strong> and involves increased neurotransmitter release and receptor sensitivity."},
  {title:"Brain Structures and Memory",text:"The <strong>hippocampus</strong> is critical for forming new <strong>explicit memories</strong>. The <strong>amygdala</strong> strengthens emotional memories. The <strong>cerebellum</strong> and <strong>basal ganglia</strong> are involved in <strong>implicit/procedural memory</strong>. <strong>H.M. (Henry Molaison)</strong> lost the ability to form new explicit memories after bilateral hippocampal removal."},
  {title:"Memory Consolidation",text:"<strong>Consolidation</strong> is the process by which short-term memories become stable long-term memories. <strong>Sleep</strong> — especially slow-wave and REM sleep — plays a critical role. Memories are gradually transferred from hippocampus to <strong>distributed cortical networks</strong> over time."},
  {title:"Schemas and Reconstruction",text:"Memories are stored within <strong>schemas</strong> — organized frameworks of knowledge. During storage, memories can be <strong>reconstructed</strong> to fit existing schemas, introducing distortions. <strong>Bartlett's War of the Ghosts</strong> study demonstrated that recall is shaped by cultural schemas."}
],
"2.6":[
  {title:"Retrieval Cues",text:"<strong>Retrieval cues</strong> are stimuli that help access stored memories. <strong>Recall</strong> requires generating information from memory (essays). <strong>Recognition</strong> requires identifying previously encountered items (multiple choice). <strong>Relearning</strong> (savings method) measures how much faster material is learned the second time."},
  {title:"Priming and Spreading Activation",text:"<strong>Priming</strong> occurs when exposure to one stimulus influences response to a subsequent stimulus. This reflects <strong>spreading activation</strong> — activating one node in a semantic network activates related concepts. Priming demonstrates the power of <strong>implicit memory</strong>."},
  {title:"Serial Position Effect",text:"The <strong>serial position effect</strong> shows we best remember items at the beginning (<strong>primacy effect</strong> — rehearsed into LTM) and end (<strong>recency effect</strong> — still in STM) of a list. Items in the middle are recalled worst. A delay before recall eliminates the recency but not primacy effect."},
  {title:"Tip-of-the-Tongue and Recall Failures",text:"<strong>Tip-of-the-tongue (TOT)</strong> phenomenon is the feeling of knowing something without being able to retrieve it. <strong>Retrieval failure</strong> often results from inadequate cues. <strong>Encoding specificity</strong> explains why returning to the original context (physical or emotional) aids recall."}
],
"2.7":[
  {title:"Forgetting Curves and Theories",text:"<strong>Ebbinghaus's forgetting curve</strong> shows rapid initial forgetting that levels off over time. <strong>Decay theory</strong> says memories fade with time. <strong>Interference theory</strong> is better supported: <strong>proactive interference</strong> (old disrupts new) and <strong>retroactive interference</strong> (new disrupts old)."},
  {title:"Memory Distortion",text:"<strong>Misinformation effect</strong> (Loftus): post-event information alters memory of the original event. <strong>Source monitoring errors</strong> confuse where a memory originated. <strong>Imagination inflation</strong>: imagining an event increases confidence it actually happened. These demonstrate memory is <strong>reconstructive</strong>, not reproductive."},
  {title:"False Memories",text:"<strong>False memories</strong> are vivid recollections of events that never occurred. Loftus's <strong>lost-in-the-mall</strong> study showed false memories can be implanted through suggestion. <strong>Flashbulb memories</strong> feel vivid and certain but are not necessarily more accurate than ordinary memories."},
  {title:"Amnesia and Motivated Forgetting",text:"<strong>Retrograde amnesia</strong> is loss of memories formed before brain injury. <strong>Anterograde amnesia</strong> is inability to form new memories after injury (as in H.M.'s case). <strong>Motivated forgetting</strong> may involve <strong>suppression</strong> (conscious) or <strong>repression</strong> (unconscious, controversial in research)."}
],
"2.8":[
  {title:"Theories of Intelligence",text:"<strong>Spearman's g</strong> (general intelligence factor) proposes a single underlying ability. <strong>Gardner's multiple intelligences</strong> (linguistic, logical, spatial, musical, etc.) challenge this. <strong>Sternberg's triarchic theory</strong> identifies analytical, creative, and practical intelligence components."},
  {title:"Intelligence Testing",text:"<strong>Binet</strong> created the first intelligence test to identify struggling students. <strong>IQ</strong> was originally mental age ÷ chronological age × 100; modern tests use <strong>deviation IQ</strong> (mean=100, SD=15). <strong>Wechsler scales</strong> (WAIS, WISC) are the most widely used today."},
  {title:"Reliability and Validity",text:"Good tests must be <strong>reliable</strong> (consistent results) and <strong>valid</strong> (measuring what they claim). <strong>Test-retest reliability</strong> checks consistency over time. <strong>Content validity</strong> ensures the test samples the relevant domain. <strong>Predictive validity</strong> measures how well scores predict future performance."},
  {title:"Nature, Nurture, and Group Differences",text:"IQ is influenced by both <strong>heredity</strong> (twin studies show ~50–80% heritability) and <strong>environment</strong> (nutrition, education, SES). <strong>The Flynn effect</strong> — rising IQ scores over generations — highlights environmental influence. Group differences in scores reflect <strong>systemic inequalities</strong>, not innate differences."}
],
"3.1":[
  {title:"Research Methods in Development",text:"<strong>Cross-sectional studies</strong> compare different age groups at one time (fast but confounded by <strong>cohort effects</strong>). <strong>Longitudinal studies</strong> follow the same group over time (no cohort effects but expensive, subject to attrition). Both help identify <strong>developmental changes</strong>."},
  {title:"Developmental Themes",text:"Key themes include <strong>continuity vs. discontinuity</strong> (gradual change vs. distinct stages), <strong>stability vs. change</strong> (traits persist or transform), and <strong>nature vs. nurture</strong> (biology vs. experience). Most modern research emphasizes <strong>interaction</strong> between these factors."},
  {title:"Critical and Sensitive Periods",text:"<strong>Critical periods</strong> are windows when certain experiences must occur for normal development (e.g., language acquisition before puberty). <strong>Sensitive periods</strong> are optimal — but not absolute — windows. <strong>Teratogens</strong> (alcohol, drugs, viruses) can cause damage during <strong>prenatal critical periods</strong>."},
  {title:"Prenatal Development",text:"The three stages are <strong>germinal</strong> (0–2 weeks, implantation), <strong>embryonic</strong> (2–8 weeks, organ formation, most vulnerable to teratogens), and <strong>fetal</strong> (9 weeks–birth, growth and maturation). <strong>Fetal alcohol spectrum disorders (FASD)</strong> result from prenatal alcohol exposure."}
],
"3.2":[
  {title:"Infant Physical Development",text:"Newborns come equipped with <strong>reflexes</strong> (rooting, sucking, grasping, Moro). Motor development follows <strong>cephalocaudal</strong> (head-to-toe) and <strong>proximodistal</strong> (center-outward) patterns. <strong>Brain development</strong> involves rapid synaptogenesis followed by <strong>synaptic pruning</strong>."},
  {title:"Adolescent Development",text:"<strong>Puberty</strong> involves hormonal changes leading to sexual maturation. The brain undergoes significant <strong>prefrontal cortex development</strong> continuing into the mid-20s, explaining adolescent risk-taking. <strong>Myelination</strong> of frontal lobes improves impulse control and decision-making over time."},
  {title:"Adulthood and Aging",text:"Physical abilities generally peak in early adulthood and gradually decline. <strong>Menopause</strong> marks the end of fertility in women. Cognitive decline varies: <strong>fluid intelligence</strong> (processing speed, novel problem-solving) decreases, while <strong>crystallized intelligence</strong> (accumulated knowledge) remains stable or increases."},
  {title:"Neuroplasticity Across the Lifespan",text:"<strong>Neuroplasticity</strong> is the brain's ability to reorganize by forming new neural connections. It is greatest in childhood but continues throughout life. <strong>Enriched environments</strong> promote neural growth. Recovery from brain damage is possible through reorganization of function to undamaged areas."}
],
"3.3":[
  {title:"Sex and Gender",text:"<strong>Sex</strong> refers to biological characteristics (chromosomes, hormones, anatomy). <strong>Gender</strong> refers to the social and psychological aspects of being male, female, or another identity. <strong>Gender identity</strong> is one's internal sense of gender. <strong>Gender expression</strong> is how one presents gender externally."},
  {title:"Gender Development Theories",text:"<strong>Social learning theory</strong> emphasizes observation and reinforcement of gender-typed behavior. <strong>Gender schema theory</strong> (Bem) proposes children develop cognitive frameworks for gender that guide perception and behavior. <strong>Biological perspectives</strong> point to prenatal hormones and brain differences."},
  {title:"Sexual Orientation",text:"<strong>Sexual orientation</strong> involves patterns of emotional and sexual attraction. Research suggests it involves a complex interaction of <strong>genetic, hormonal, and environmental</strong> factors. <strong>Prenatal hormone exposure</strong> and genetic studies (twin concordance) support biological contributions."},
  {title:"Intersections of Sex, Gender, and Culture",text:"<strong>Gender roles</strong> vary significantly across cultures and historical periods. <strong>Androgyny</strong> describes individuals who express both traditionally masculine and feminine traits. Research shows gender similarities often outweigh differences on most psychological variables (<strong>gender similarities hypothesis</strong>)."}
],
"3.4":[
  {title:"Piaget's Stages",text:"<strong>Sensorimotor</strong> (0–2): learning through senses/actions, developing <strong>object permanence</strong>. <strong>Preoperational</strong> (2–7): symbolic thinking but <strong>egocentric</strong>, lacking <strong>conservation</strong>. <strong>Concrete operational</strong> (7–11): logical thinking about concrete events. <strong>Formal operational</strong> (12+): <strong>abstract and hypothetical reasoning</strong>."},
  {title:"Vygotsky's Sociocultural Theory",text:"<strong>Vygotsky</strong> emphasized that cognitive development is driven by <strong>social interaction</strong>. The <strong>zone of proximal development (ZPD)</strong> is the gap between what a child can do alone and with guidance. <strong>Scaffolding</strong> provides temporary support that is gradually removed as competence grows."},
  {title:"Information Processing Approach",text:"This approach views cognitive development as <strong>gradual, continuous improvement</strong> in processing capacity, speed, and strategies — rather than discrete stages. <strong>Attention, memory strategies, and metacognition</strong> all develop throughout childhood and adolescence."},
  {title:"Cognitive Aging",text:"With aging, <strong>processing speed</strong> declines and <strong>working memory</strong> capacity may shrink. However, <strong>wisdom, expertise, and crystallized knowledge</strong> often increase. <strong>Dementia</strong> (including Alzheimer's disease) is a pathological condition, not a normal part of aging. Cognitive engagement may provide protective benefits."}
],
"3.5":[
  {title:"Language Development Milestones",text:"Infants progress from <strong>cooing</strong> (~2 months) to <strong>babbling</strong> (~6 months) to <strong>one-word/holophrastic stage</strong> (~12 months) to <strong>two-word/telegraphic speech</strong> (~24 months). <strong>Overgeneralization</strong> of grammatical rules (e.g., 'goed') demonstrates rule-learning, not mere imitation."},
  {title:"Theories of Language Acquisition",text:"<strong>Chomsky's nativist theory</strong> proposes an innate <strong>language acquisition device (LAD)</strong> with a <strong>universal grammar</strong>. <strong>Skinner's behaviorist view</strong> emphasizes reinforcement and imitation. <strong>Interactionist perspectives</strong> integrate biological readiness with social interaction and input."},
  {title:"Critical Period for Language",text:"Evidence from <strong>feral children</strong> (e.g., Genie) and <strong>deaf children's sign language acquisition</strong> supports a <strong>critical/sensitive period</strong> for language — roughly before puberty. After this window, achieving native-level fluency becomes significantly more difficult."},
  {title:"Bilingualism and Language",text:"<strong>Bilingual</strong> individuals may show advantages in <strong>executive function</strong> and cognitive flexibility. <strong>Code-switching</strong> between languages is a sign of competence, not confusion. Second language acquisition follows similar stages but is influenced by <strong>first language transfer</strong>."}
],
"3.6":[
  {title:"Attachment Theory",text:"<strong>Bowlby</strong> proposed that infants are biologically programmed to form <strong>attachments</strong> that promote survival. <strong>Ainsworth's Strange Situation</strong> identified <strong>secure, avoidant, anxious-ambivalent</strong>, and later <strong>disorganized</strong> attachment styles. Early attachment predicts later social and emotional functioning."},
  {title:"Erikson's Psychosocial Stages",text:"<strong>Erikson</strong> proposed eight stages of psychosocial development across the lifespan. Key crises: <strong>trust vs. mistrust</strong> (infancy), <strong>identity vs. role confusion</strong> (adolescence), <strong>intimacy vs. isolation</strong> (young adulthood), and <strong>integrity vs. despair</strong> (late adulthood)."},
  {title:"Parenting Styles",text:"<strong>Baumrind</strong> identified three styles: <strong>authoritative</strong> (high warmth, high control — best outcomes), <strong>authoritarian</strong> (low warmth, high control), and <strong>permissive</strong> (high warmth, low control). <strong>Uninvolved/neglectful</strong> parenting (low both) was added later. Cultural context influences which style is most adaptive."},
  {title:"Social Development in Adolescence and Adulthood",text:"Adolescents develop <strong>identity</strong> through exploration (Marcia's identity statuses: achievement, moratorium, foreclosure, diffusion). <strong>Peer influence</strong> peaks in adolescence. Adulthood involves navigating <strong>intimate relationships, generativity</strong> (contributing to the next generation), and <strong>life review</strong> in later years."}
],
"3.7":[
  {title:"Pavlov and Classical Conditioning",text:"<strong>Classical conditioning</strong> pairs a <strong>neutral stimulus (NS)</strong> with an <strong>unconditioned stimulus (US)</strong> that naturally produces an <strong>unconditioned response (UR)</strong>. After repeated pairing, the NS becomes a <strong>conditioned stimulus (CS)</strong> that elicits a <strong>conditioned response (CR)</strong>."},
  {title:"Key Processes",text:"<strong>Acquisition</strong>: the CS-US pairing phase. <strong>Extinction</strong>: the CR weakens when CS is presented without US. <strong>Spontaneous recovery</strong>: the CR reappears after a rest period. <strong>Stimulus generalization</strong>: responding to similar stimuli. <strong>Stimulus discrimination</strong>: responding only to the specific CS."},
  {title:"Applications of Classical Conditioning",text:"<strong>Watson's Little Albert</strong> study conditioned fear of a white rat in an infant. <strong>Taste aversions</strong> can develop in a single trial — an evolutionary adaptation (<strong>Garcia effect</strong>). <strong>Systematic desensitization</strong> (Wolpe) uses counterconditioning to treat phobias by pairing feared stimuli with relaxation."},
  {title:"Biological Constraints on Conditioning",text:"<strong>Biological preparedness</strong> (Seligman) means organisms are predisposed to associate certain stimuli more easily — like taste with nausea or visual cues with shock. This challenges the behaviorist assumption that any stimulus can be equally conditioned. Evolution shapes what associations form most readily."}
],
"3.8":[
  {title:"Thorndike and Skinner",text:"<strong>Thorndike's law of effect</strong>: behaviors followed by satisfying consequences are strengthened. <strong>Skinner</strong> expanded this into <strong>operant conditioning</strong>, distinguishing behaviors by their consequences. The <strong>Skinner box (operant chamber)</strong> allowed precise measurement of learning."},
  {title:"Reinforcement",text:"<strong>Positive reinforcement</strong>: adding a pleasant stimulus increases behavior. <strong>Negative reinforcement</strong>: removing an aversive stimulus increases behavior. Both strengthen behavior. <strong>Primary reinforcers</strong> satisfy biological needs; <strong>secondary (conditioned) reinforcers</strong> are learned (money, grades)."},
  {title:"Punishment and Schedules",text:"<strong>Positive punishment</strong>: adding aversive stimulus decreases behavior. <strong>Negative punishment</strong>: removing pleasant stimulus decreases behavior. <strong>Schedules of reinforcement</strong>: <strong>fixed-ratio</strong> (every nth response), <strong>variable-ratio</strong> (unpredictable number — most resistant to extinction), <strong>fixed-interval</strong>, <strong>variable-interval</strong>."},
  {title:"Shaping and Behavior Modification",text:"<strong>Shaping</strong> reinforces successive approximations toward a target behavior. <strong>Chaining</strong> links simple behaviors into complex sequences. <strong>Token economies</strong> use secondary reinforcers exchangeable for rewards. <strong>Behavior modification</strong> applies operant principles in clinical, educational, and organizational settings."}
],
"3.9":[
  {title:"Observational Learning",text:"<strong>Bandura's social learning theory</strong> shows that learning occurs by watching <strong>models</strong>. The <strong>Bobo doll experiment</strong> demonstrated children imitate aggressive behavior. Four processes: <strong>attention, retention, reproduction, and motivation</strong>. <strong>Vicarious reinforcement/punishment</strong> affects whether observed behavior is performed."},
  {title:"Cognitive Factors in Learning",text:"<strong>Latent learning</strong> (Tolman): learning occurs without reinforcement and is demonstrated only when motivation exists (e.g., <strong>cognitive maps</strong> in rats). <strong>Insight learning</strong> (Köhler): sudden understanding of problem solutions without trial-and-error. Both challenge strict behaviorism."},
  {title:"Mirror Neurons",text:"<strong>Mirror neurons</strong> fire both when performing an action and when observing someone else perform it. They may underlie <strong>imitation, empathy, and social learning</strong>. Their discovery supports the neurological basis of observational learning and understanding others' intentions."},
  {title:"Learned Helplessness",text:"<strong>Seligman's learned helplessness</strong>: organisms exposed to inescapable aversive events stop trying to escape even when escape becomes possible. This has been linked to <strong>depression</strong> in humans. <strong>Explanatory style</strong> (internal, stable, global attributions for failure) predicts vulnerability to helplessness."}
],
"4.1":[
  {title:"Attribution Theory",text:"<strong>Attribution theory</strong> explains how people interpret the causes of behavior. <strong>Dispositional (internal) attributions</strong> credit personality/character. <strong>Situational (external) attributions</strong> credit circumstances. <strong>Fritz Heider</strong> pioneered the study of how ordinary people explain events."},
  {title:"Fundamental Attribution Error",text:"The <strong>fundamental attribution error (FAE)</strong> is the tendency to overestimate dispositional factors and underestimate situational factors when explaining others' behavior. This bias is <strong>stronger in individualistic cultures</strong>. We show an <strong>actor-observer bias</strong> — attributing our own behavior more to situations."},
  {title:"Self-Serving Bias",text:"The <strong>self-serving bias</strong> leads people to attribute successes to internal factors and failures to external factors. This protects <strong>self-esteem</strong>. <strong>Just-world hypothesis</strong> (Lerner) — the belief that people get what they deserve — can lead to blaming victims for their misfortunes."},
  {title:"Person Perception",text:"<strong>First impressions</strong> form rapidly and are heavily influenced by <strong>physical appearance, nonverbal cues, and schemas</strong>. The <strong>halo effect</strong> extends a positive impression of one trait to unrelated traits. <strong>Self-fulfilling prophecies</strong> occur when expectations about a person elicit behavior that confirms those expectations."}
],
"4.2":[
  {title:"Attitude Components and Formation",text:"Attitudes have <strong>cognitive</strong> (beliefs), <strong>affective</strong> (feelings), and <strong>behavioral</strong> (actions) components. Attitudes form through <strong>direct experience, conditioning, observational learning</strong>, and social influence. <strong>Mere exposure effect</strong>: repeated exposure to a stimulus increases liking."},
  {title:"Cognitive Dissonance",text:"<strong>Festinger's cognitive dissonance theory</strong>: holding contradictory beliefs or behaving inconsistently with beliefs creates psychological tension. People reduce dissonance by <strong>changing beliefs, adding consonant cognitions, or trivializing</strong> the inconsistency. The less external justification, the greater the attitude change."},
  {title:"Persuasion",text:"The <strong>elaboration likelihood model (ELM)</strong> proposes two routes to persuasion: <strong>central route</strong> (careful evaluation of arguments — leads to lasting change) and <strong>peripheral route</strong> (influenced by superficial cues like attractiveness or credibility — leads to temporary change)."},
  {title:"Attitudes and Behavior",text:"Attitudes predict behavior best when they are <strong>strong, specific, and accessible</strong>. <strong>Foot-in-the-door technique</strong>: small compliance leads to larger compliance. <strong>Door-in-the-face technique</strong>: large request followed by smaller target request. People align attitudes with behavior to reduce dissonance."}
],
"4.3":[
  {title:"Conformity",text:"<strong>Asch's conformity experiments</strong> showed people conform to an obviously incorrect group answer about 37% of the time. Conformity increases with <strong>group size (to a point), unanimity, and low self-confidence</strong>. <strong>Normative influence</strong> (desire to fit in) and <strong>informational influence</strong> (desire to be correct) both drive conformity."},
  {title:"Obedience",text:"<strong>Milgram's obedience studies</strong> demonstrated that ~65% of participants administered maximum voltage shocks when instructed by an authority figure. Obedience decreased with <strong>physical proximity to the victim, absence of authority, and presence of disobedient peers</strong>."},
  {title:"Group Dynamics",text:"<strong>Social facilitation</strong>: presence of others enhances performance on simple tasks but impairs complex tasks. <strong>Social loafing</strong>: reduced effort in groups. <strong>Groupthink</strong> (Janis): groups prioritize harmony over critical thinking. <strong>Group polarization</strong>: group discussion strengthens pre-existing attitudes."},
  {title:"Prosocial Behavior and Aggression",text:"<strong>Bystander effect</strong>: the more bystanders present, the less likely any individual is to help (<strong>diffusion of responsibility</strong>). <strong>Altruism</strong> may be driven by empathy (Batson). <strong>Aggression</strong> is influenced by <strong>frustration-aggression hypothesis, social learning, and biological factors</strong> (testosterone, amygdala activity)."}
],
"4.4":[
  {title:"Freud's Psychoanalytic Theory",text:"<strong>Freud</strong> proposed personality arises from conflicts among the <strong>id</strong> (pleasure principle), <strong>ego</strong> (reality principle), and <strong>superego</strong> (moral standards). <strong>Defense mechanisms</strong> (repression, projection, displacement, sublimation, rationalization) protect the ego from anxiety."},
  {title:"Psychosexual Stages",text:"Freud's <strong>psychosexual stages</strong> — oral, anal, phallic (Oedipus/Electra complex), latency, genital — propose that personality is shaped by childhood conflicts. <strong>Fixation</strong> at a stage (from over- or under-gratification) leads to characteristic adult personality traits."},
  {title:"Neo-Freudian and Psychodynamic Views",text:"<strong>Jung</strong> proposed the <strong>collective unconscious</strong> and archetypes. <strong>Adler</strong> emphasized <strong>inferiority complexes</strong> and striving for superiority. <strong>Horney</strong> critiqued Freud's gender bias and emphasized <strong>basic anxiety</strong> from childhood insecurity. All retained emphasis on unconscious processes."},
  {title:"Humanistic Theories",text:"<strong>Maslow's hierarchy of needs</strong> culminates in <strong>self-actualization</strong>. <strong>Rogers</strong> emphasized the <strong>self-concept</strong> and the gap between the <strong>ideal self and real self</strong>. <strong>Unconditional positive regard</strong> from others supports healthy personality development. Humanistic approaches emphasize free will and personal growth."}
],
"4.5":[
  {title:"Trait Theories",text:"<strong>Allport</strong> catalogued thousands of trait words. <strong>Cattell</strong> used factor analysis to identify 16 personality factors. The <strong>Big Five (OCEAN)</strong> — <strong>Openness, Conscientiousness, Extraversion, Agreeableness, Neuroticism</strong> — is the most widely accepted model. Traits show moderate <strong>heritability</strong> and cross-cultural consistency."},
  {title:"Personality Assessment",text:"<strong>Self-report inventories</strong> (MMPI, Big Five questionnaires) are standardized and objective but subject to <strong>social desirability bias</strong>. <strong>Projective tests</strong> (<strong>Rorschach inkblots, TAT</strong>) are less reliable but may reveal unconscious processes. <strong>Behavioral assessment</strong> directly observes behavior in context."},
  {title:"Social-Cognitive Theory",text:"<strong>Bandura's social-cognitive theory</strong> emphasizes <strong>reciprocal determinism</strong>: personality results from the interaction of <strong>behavior, cognition, and environment</strong>. <strong>Self-efficacy</strong> — belief in one's ability to succeed — strongly predicts behavior. <strong>Locus of control</strong> (Rotter): internal vs. external beliefs about outcomes."},
  {title:"Person-Situation Debate",text:"<strong>Mischel</strong> challenged trait theory, arguing behavior is more situationally determined than trait-consistent. The modern resolution: personality traits predict <strong>aggregate behavior across situations</strong> but not necessarily behavior in any single situation. <strong>Interactionism</strong> acknowledges both traits and situations matter."}
],
"4.6":[
  {title:"Drive Reduction and Arousal",text:"<strong>Drive reduction theory</strong> (Hull): physiological needs create drives that motivate behavior to restore <strong>homeostasis</strong>. <strong>Arousal theory</strong>: people seek an optimal level of stimulation — the <strong>Yerkes-Dodson law</strong> states moderate arousal produces best performance (lower arousal for complex tasks)."},
  {title:"Hunger and Eating",text:"Hunger is regulated by the <strong>hypothalamus</strong> (lateral = hunger, ventromedial = satiety), <strong>blood glucose</strong> levels, and hormones (<strong>ghrelin</strong> stimulates hunger; <strong>leptin</strong> signals satiety). <strong>Set point theory</strong> suggests the body maintains a preferred weight. Social, cultural, and psychological factors also influence eating."},
  {title:"Maslow and Intrinsic/Extrinsic Motivation",text:"<strong>Maslow's hierarchy</strong>: physiological → safety → belongingness → esteem → self-actualization. <strong>Intrinsic motivation</strong> comes from internal satisfaction. <strong>Extrinsic motivation</strong> comes from external rewards. The <strong>overjustification effect</strong>: external rewards can undermine intrinsic motivation."},
  {title:"Achievement and Self-Determination",text:"<strong>Self-determination theory</strong> (Deci & Ryan): three innate needs — <strong>autonomy, competence, and relatedness</strong> — drive intrinsic motivation. <strong>Achievement motivation</strong> involves the desire to accomplish difficult goals. <strong>Flow</strong> (Csikszentmihalyi) is total absorption in an optimally challenging activity."}
],
"4.7":[
  {title:"Theories of Emotion",text:"<strong>James-Lange</strong>: physiological arousal precedes and causes emotional experience. <strong>Cannon-Bard</strong>: arousal and emotion occur simultaneously and independently. <strong>Schachter-Singer (two-factor)</strong>: emotion = physiological arousal + cognitive label. <strong>Lazarus</strong>: cognitive appraisal is required before emotion."},
  {title:"Emotional Expression",text:"<strong>Ekman</strong> identified six (later seven) <strong>universal facial expressions</strong>: happiness, sadness, anger, fear, surprise, disgust (+ contempt). <strong>Display rules</strong> are cultural norms governing emotional expression. The <strong>facial feedback hypothesis</strong> suggests that facial expressions can influence emotional experience."},
  {title:"Physiological Bases of Emotion",text:"The <strong>amygdala</strong> is central to fear processing and emotional memory. The <strong>autonomic nervous system</strong> activates the fight-or-flight response. <strong>LeDoux</strong> identified two pathways: a fast <strong>thalamus-to-amygdala</strong> route (low road) and a slower <strong>thalamus-to-cortex-to-amygdala</strong> route (high road)."},
  {title:"Stress and Emotion",text:"<strong>Stress</strong> is the body's response to perceived threats or challenges. <strong>Selye's General Adaptation Syndrome (GAS)</strong>: alarm → resistance → exhaustion. <strong>Lazarus's appraisal model</strong> distinguishes <strong>primary appraisal</strong> (threat assessment) and <strong>secondary appraisal</strong> (coping resources). Chronic stress impairs immune function and health."}
],
"5.1":[
  {title:"Health Psychology Overview",text:"<strong>Health psychology</strong> examines how psychological, behavioral, and social factors affect health and illness. The <strong>biopsychosocial model</strong> integrates biological, psychological, and social factors. Behavior is the leading contributor to preventable death (smoking, poor diet, inactivity)."},
  {title:"Stress and Health",text:"<strong>Chronic stress</strong> elevates <strong>cortisol</strong>, suppresses immune function, and increases risk for cardiovascular disease. <strong>Type A personality</strong> (competitive, hostile) is linked to heart disease — particularly the <strong>hostility</strong> component. <strong>Perceived control</strong> and <strong>social support</strong> buffer against stress."},
  {title:"Coping Strategies",text:"<strong>Problem-focused coping</strong> addresses the stressor directly (taking action). <strong>Emotion-focused coping</strong> manages emotional responses (reappraisal, seeking support). <strong>Adaptive strategies</strong> include exercise, mindfulness, and social connection. <strong>Maladaptive strategies</strong> include denial, substance use, and avoidance."},
  {title:"Health-Promoting Behaviors",text:"<strong>Aerobic exercise</strong> reduces anxiety, depression, and stress while improving cognitive function. <strong>Sleep hygiene</strong> supports mental and physical health. <strong>Social support</strong> is one of the strongest predictors of health outcomes. <strong>Mindfulness and relaxation techniques</strong> reduce physiological stress responses."}
],
"5.2":[
  {title:"Positive Psychology",text:"<strong>Positive psychology</strong> (Seligman) studies what makes life worth living — <strong>strengths, virtues, and optimal functioning</strong> rather than pathology. Key topics include <strong>happiness, resilience, gratitude, and meaning</strong>. It complements (rather than replaces) traditional clinical approaches."},
  {title:"Subjective Well-Being",text:"<strong>Subjective well-being (SWB)</strong> encompasses <strong>life satisfaction, positive affect, and low negative affect</strong>. <strong>Hedonic adaptation</strong>: people return to a baseline happiness level after positive or negative events. Income increases SWB only up to a point; <strong>social relationships</strong> are stronger predictors."},
  {title:"Character Strengths and Flow",text:"<strong>Peterson and Seligman's VIA classification</strong> identifies 24 character strengths across 6 virtues (wisdom, courage, humanity, justice, temperance, transcendence). Using <strong>signature strengths</strong> in daily life enhances well-being. <strong>Flow states</strong> occur when challenge matches skill level."},
  {title:"Resilience and Growth",text:"<strong>Resilience</strong> is the ability to recover from adversity. Factors include <strong>optimistic explanatory style, social support, self-efficacy, and emotion regulation</strong>. <strong>Post-traumatic growth</strong> is positive psychological change following struggle with a major life crisis — including enhanced relationships and new possibilities."}
],
"5.3":[
  {title:"Defining Psychological Disorders",text:"Psychological disorders are patterns of behavior or experience that are <strong>deviant, distressful, dysfunctional, and potentially dangerous</strong> (the \"4 D's\"). The <strong>medical model</strong> treats disorders as diseases with biological causes. The <strong>biopsychosocial model</strong> considers biological, psychological, and social factors."},
  {title:"The DSM-5",text:"The <strong>DSM-5 (Diagnostic and Statistical Manual)</strong> is the standard classification system for mental disorders in the U.S. It uses <strong>descriptive criteria</strong> (symptoms, duration, impairment) rather than causes. Criticisms include <strong>labeling effects, cultural bias</strong>, and boundary issues between normal and abnormal."},
  {title:"Etiology and Risk Factors",text:"<strong>Diathesis-stress model</strong>: disorders result from the interaction of a genetic/biological <strong>predisposition (diathesis)</strong> and <strong>environmental stressors</strong>. Risk factors include <strong>family history, trauma, substance use, poverty</strong>, and lack of social support. Protective factors include resilience and strong social connections."},
  {title:"Stigma and Cultural Considerations",text:"<strong>Stigma</strong> — negative attitudes toward mental illness — leads to discrimination, reduced help-seeking, and poorer outcomes. <strong>Culture-bound syndromes</strong> vary across societies. Cultural context affects how disorders are expressed (<strong>symptom presentation</strong>), perceived, and treated. <strong>Cultural competence</strong> in assessment is essential."}
],
"5.4":[
  {title:"Anxiety and Related Disorders",text:"<strong>Generalized anxiety disorder (GAD)</strong>: chronic, excessive worry. <strong>Panic disorder</strong>: recurrent unexpected panic attacks. <strong>Specific phobias</strong>: intense fear of specific objects/situations. <strong>Social anxiety disorder</strong>: fear of social scrutiny. <strong>OCD</strong> involves intrusive thoughts (obsessions) and repetitive behaviors (compulsions)."},
  {title:"Depressive and Bipolar Disorders",text:"<strong>Major depressive disorder (MDD)</strong>: persistent depressed mood, loss of interest, sleep/appetite changes, fatigue, worthlessness. <strong>Bipolar disorder</strong> involves episodes of <strong>mania</strong> (elevated mood, energy, impulsivity) alternating with depression. <strong>Serotonin, norepinephrine</strong>, and neural circuit dysfunction are implicated."},
  {title:"Schizophrenia Spectrum",text:"<strong>Schizophrenia</strong> involves <strong>positive symptoms</strong> (hallucinations, delusions, disorganized speech) and <strong>negative symptoms</strong> (flat affect, avolition, social withdrawal). <strong>Dopamine hypothesis</strong>: excess dopamine activity contributes. <strong>Genetic predisposition</strong> is strong (concordance ~48% in identical twins)."},
  {title:"Trauma, Dissociative, and Personality Disorders",text:"<strong>PTSD</strong> follows exposure to trauma and involves re-experiencing, avoidance, hyperarousal, and negative cognitions. <strong>Dissociative disorders</strong> involve disruptions in identity, memory, or consciousness (e.g., dissociative identity disorder). <strong>Personality disorders</strong> are enduring, inflexible patterns (e.g., borderline, antisocial)."}
],
"5.5":[
  {title:"Psychotherapy Approaches",text:"<strong>Psychodynamic therapy</strong> explores unconscious conflicts and defense mechanisms. <strong>Humanistic/client-centered therapy</strong> (Rogers) provides unconditional positive regard. <strong>Cognitive therapy</strong> (Beck) identifies and restructures distorted thoughts. <strong>CBT</strong> combines cognitive restructuring with behavioral techniques."},
  {title:"Behavioral Therapies",text:"<strong>Systematic desensitization</strong> pairs relaxation with a fear hierarchy to treat phobias. <strong>Exposure therapy</strong> confronts feared stimuli directly. <strong>Aversion therapy</strong> pairs undesirable behavior with an unpleasant stimulus. <strong>Token economies</strong> use operant conditioning in institutional settings."},
  {title:"Biomedical Treatments",text:"<strong>Antidepressants</strong> (SSRIs) increase serotonin availability. <strong>Antipsychotics</strong> block dopamine receptors. <strong>Anxiolytics</strong> (benzodiazepines) enhance GABA activity. <strong>Mood stabilizers</strong> (lithium) treat bipolar disorder. <strong>Electroconvulsive therapy (ECT)</strong> is used for severe, treatment-resistant depression."},
  {title:"Effectiveness and Ethics",text:"<strong>Meta-analyses</strong> show psychotherapy is generally effective, with <strong>CBT having the strongest evidence base</strong>. The <strong>therapeutic alliance</strong> (quality of client-therapist relationship) is the strongest predictor of outcome across approaches. <strong>Evidence-based practice</strong> integrates research evidence, clinical expertise, and patient values."}
]
};
